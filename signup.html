<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crear cuenta · TheJ ToolBox</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="app login-page">

    <form id="signup-form" class="login-box">

      <img src="assets/images/logo.png" alt="Logo" class="login-logo" />

      <h1>Crear cuenta</h1>

      <div id="signup-error" class="error-box"></div>

      <input id="name" type="text" placeholder="Nombre" required />
      <input id="surname" type="text" placeholder="Apellidos" required />
      <input id="phone" type="tel" placeholder="Teléfono" required />

      <input id="email" type="email" placeholder="Correo electrónico" required />
      <input id="password" type="password" placeholder="Contraseña" required />

      <button type="submit">Crear cuenta</button>

      <div class="loader" id="signup-loader"></div>

      <div class="login-links">
        <a href="login.html">¿Ya tienes cuenta? Inicia sesión</a>
      </div>

    </form>

  </div>


  <script>
    // Inject environment variables before Supabase initialization
    window.ENV = {
      SUPABASE_URL: "https://osudezxnludhewdxeaks.supabase.co",
      SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zdWRlenhubHVkaGV3ZHhlYWtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ0OTQxMTksImV4cCI6MjA4MDA3MDExOX0.RLkgHZ8FHaSzXt18Zag3QHmkBE1SBjfbZ0wSUmh3sxo"
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>

  <script>
    const form = document.getElementById("signup-form");
    const errorBox = document.getElementById("signup-error");
    const loader = document.getElementById("signup-loader");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      errorBox.style.display = "none";
      loader.style.display = "block";

      const name = document.getElementById("name").value.trim();
      const surname = document.getElementById("surname").value.trim();
      const phone = document.getElementById("phone").value.trim();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        // Usar función signup de supabase.js que crea usuario y perfil
        await signup(email, password, name, surname, phone);

        // Redirigir a verificación de email
        window.location.href = "verify.html";

      } catch (err) {
        errorBox.textContent = err.message;
        errorBox.style.display = "block";

      } finally {
        loader.style.display = "none";
      }
    });
  </script>

</body>
</html>
