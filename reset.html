<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Restablecer contraseña · TheJ ToolBox</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="app login-page">

    <form id="reset-form" class="login-box">

      <img src="assets/images/logo.png" alt="Logo" class="login-logo" />

      <h1>Restablecer contraseña</h1>

      <p style="text-align:center; margin-top:-10px; margin-bottom:20px; color:var(--txt-2);">
        Introduce tu nueva contraseña.
      </p>

      <!-- MENSAJE -->
      <div id="reset-error" class="error-box"></div>

      <input id="password" type="password" placeholder="Nueva contraseña" required />
      <input id="password2" type="password" placeholder="Repetir contraseña" required />

      <button type="submit">Actualizar contraseña</button>

      <div class="loader" id="reset-loader"></div>

      <div class="login-links" style="margin-top:20px;">
        <a href="login.html">← Volver al inicio de sesión</a>
      </div>

    </form>

  </div>

  <!-- SUPABASE -->
  <script>
    // Inject environment variables before Supabase initialization
    window.ENV = {
      SUPABASE_URL: "https://osudezxnludhewdxeaks.supabase.co",
      SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zdWRlenhubHVkaGV3ZHhlYWtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ0OTQxMTksImV4cCI6MjA4MDA3MDExOX0.RLkgHZ8FHaSzXt18Zag3QHmkBE1SBjfbZ0wSUmh3sxo"
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>

  <!-- LÓGICA DEL FORMULARIO -->
  <script>
    const form = document.getElementById("reset-form");
    const errorBox = document.getElementById("reset-error");
    const loader = document.getElementById("reset-loader");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      errorBox.style.display = "none";
      loader.style.display = "block";

      const pass1 = document.getElementById("password").value.trim();
      const pass2 = document.getElementById("password2").value.trim();

      if (pass1 !== pass2) {
        errorBox.style.display = "block";
        errorBox.textContent = "Las contraseñas no coinciden.";
        loader.style.display = "none";
        return;
      }

      try {
        const { error } = await client.auth.updateUser({
          password: pass1
        });

        if (error) throw error;

        errorBox.style.display = "block";
        errorBox.style.color = "var(--success)";
        errorBox.textContent = "Contraseña actualizada correctamente ✔";

        setTimeout(() => {
          window.location.href = "login.html";
        }, 1500);

      } catch (err) {
        errorBox.style.display = "block";
        errorBox.style.color = "var(--danger)";
        errorBox.textContent = err.message;

      } finally {
        loader.style.display = "none";
      }
    });
  </script>

</body>
</html>
