<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Búsqueda · TheJ ToolBox</title>
  <style>
    body {
      margin: 0;
      padding: 1rem;
      background: #2A2D34;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto;
      color: rgba(238,244,255,.95);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .header h1 {
      margin: 0;
      color: #81A2D1;
      font-size: 1.5rem;
    }
    .buttons {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .action-btn {
      padding: 0.35rem 0.65rem;
      background: transparent;
      border: 1.5px solid #81A2D1;
      border-radius: 5px;
      color: #81A2D1;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      line-height: 1.3;
    }
    .action-btn:hover {
      background: #81A2D1;
      color: white;
    }
    .content {
      background: #1F1F1F;
      padding: 2rem;
      border-radius: 6px;
      text-align: center;
    }
    .content p {
      color: rgba(238,244,255,.5);
      margin: 0;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Búsqueda</h1>
    <div class="buttons">
      <button class="action-btn" onclick="showHelp()">❓ Ayuda</button>
      <button class="action-btn" onclick="openFullWindow()">🔗 Ventana Completa</button>
    </div>
  </div>

  <div class="content">
    <p>Busca documentos y registros en el sistema.</p>
    <p style="margin-top: 1rem; font-size: 0.85rem;">Módulo en preparación.</p>
  </div>

  <script>
    window.showHelp = function() {
      alert('Búsqueda\n\nBusca documentos y registros en el sistema.\n\nEsta función estará disponible próximamente.');
    };

    window.openFullWindow = function() {
      window.open('search.html', '_blank', 'width=1200,height=800');
    };
  </script>

</body>
</html>
