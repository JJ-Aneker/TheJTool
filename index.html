      </div>


      <div class="topbar-right">
              <button class="navLink" id="btnUser" type="button">

            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">

              <path d="M4 12h11" stroke="rgba(238,244,255,.9)" stroke-width="1.8" stroke-linecap="round"/>
