<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Therefore eForms Builder · Aneker</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      padding: 20px;
      min-height: 100vh;
      background:
        radial-gradient(1200px 800px at 80% 10%, #1a2130 0%, var(--bg) 60%),
        var(--bg);
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }

    /* Select dropdown styling */
    select { color-scheme: dark; }
    option { background: #1a1f26; color: #e6e7eb; }
    option:checked { background: #9ad1ff; color: #000; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState } = React;

    // ── HELPERS ───────────────────────────────────────────────────────────────
    function newGuid() {
      return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16).toUpperCase();
      });
    }

    function escXml(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    // camelCase key desde texto: "Nombre completo" → "nombreCompleto"
    function toCamelKey(s) {
      return String(s ?? "")
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .replace(/[^A-Za-z0-9\s]/g, "")
        .trim()
        .split(/\s+/)
        .filter(Boolean)
        .map((w, i) => i === 0 ? w.toLowerCase() : w.charAt(0).toUpperCase() + w.slice(1).toLowerCase())
        .join("") || "campo";
    }

    function dcreaNow() {
      const d = new Date();
      const p = (n, l=2) => String(n).padStart(l, "0");
      return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}000`;
    }

    // ── FIELD TYPES ───────────────────────────────────────────────────────────
    const FIELD_TYPES = [
      { value: "text",        label: "Texto",            formio: "textfield"   },
      { value: "email",       label: "Email",             formio: "email"       },
      { value: "phone",       label: "Teléfono",          formio: "phoneNumber" },
      { value: "date",        label: "Fecha",             formio: "datetime"    },
      { value: "datetime",    label: "Fecha y hora",      formio: "datetime"    },
      { value: "number",      label: "Número entero",     formio: "number"      },
      { value: "money",       label: "Importe (€)",       formio: "currency"    },
      { value: "checkbox",    label: "Casilla (Sí/No)",   formio: "checkbox"    },
      { value: "select",      label: "Lista desplegable", formio: "select"      },
    ];

    const TYPE_ALIAS = {
      "string":"text","texto":"text","text":"text","str":"text","varchar":"text",
      "email":"email","correo":"email","mail":"email",
      "phone":"phone","telefono":"phone","teléfono":"phone","tel":"phone","phonenumber":"phone",
      "date":"date","fecha":"date",
      "timestamp":"datetime","datetime":"datetime","fecha y hora":"datetime",
      "integer":"number","entero":"number","int":"number","número":"number","numero":"number",
      "money":"money","importe":"money","float":"money","decimal":"money","currency":"money",
      "logical":"checkbox","lógico":"checkbox","logico":"checkbox",
      "checkbox":"checkbox","bool":"checkbox","boolean":"checkbox",
      "lookup":"select","lista":"select","combo":"select","desplegable":"select","select":"select",
    };

    // ── FORM.IO COMPONENT BUILDER ─────────────────────────────────────────────
    // Genera el componente Form.io con todas las propiedades que Therefore espera
    const COND_EMPTY  = { show: "", when: "", json: "" };
    const COMP_EXTRAS = { reorder: false, properties: {}, customConditional: "", logic: [], attributes: {}, conditional: COND_EMPTY };
    const VALIDATE_BASE = (required, extra={}) => ({ required, customMessage: "", json: "", ...extra });

    function buildComponent(f) {
      const key = f.fieldKey || toCamelKey(f.nombre);

      switch (f.tipo) {

        case "date":
          return { label: f.nombre, tableView: true, alwaysEnabled: false,
            type: "datetime", input: true, key,
            enableDate: true, enableTime: false, format: "dd/MM/yyyy",
            ...COMP_EXTRAS,
            validate: VALIDATE_BASE(f.required) };

        case "datetime":
          return { label: f.nombre, tableView: true, alwaysEnabled: false,
            type: "datetime", input: true, key,
            enableDate: true, enableTime: true, format: "dd/MM/yyyy HH:mm",
            ...COMP_EXTRAS,
            validate: VALIDATE_BASE(f.required) };

        case "number":
          return { label: f.nombre, tableView: true, alwaysEnabled: false,
            type: "number", input: true, key,
            ...(f.defaultValue ? { defaultValue: f.defaultValue } : {}),
            ...COMP_EXTRAS,
            validate: VALIDATE_BASE(f.required) };

        case "money":
          return { label: f.nombre, tableView: true, alwaysEnabled: false,
            type: "currency", input: true, key, currency: "EUR",
            ...(f.defaultValue ? { defaultValue: f.defaultValue } : {}),
            ...COMP_EXTRAS,
            validate: VALIDATE_BASE(f.required) };

        case "checkbox":
          return { label: f.nombre, tableView: true, alwaysEnabled: false,
            type: "checkbox", input: true, key,
            ...COMP_EXTRAS,
            validate: VALIDATE_BASE(f.required) };

        case "email":
          return { label: f.nombre, allowMultipleMasks: false, showWordCount: false, showCharCount: false,
            tableView: true, alwaysEnabled: false,
            type: "email", input: true, key,
            inputFormat: "plain", encrypted: false,
            ...(f.placeholder ? { placeholder: f.placeholder } : {}),
            ...COMP_EXTRAS,
            validate: VALIDATE_BASE(f.required) };

        case "phone":
          return { label: f.nombre, allowMultipleMasks: false, showWordCount: false, showCharCount: false,
            tableView: true, alwaysEnabled: false,
            type: "phoneNumber", input: true, key,
            defaultValue: "", inputFormat: "plain", encrypted: false,
            ...COMP_EXTRAS,
            validate: VALIDATE_BASE(f.required) };

        case "select": {
          const values = (f.options || "")
            .split("\n").map(l => l.trim()).filter(Boolean)
            .map(l => {
              const [lbl, val] = l.includes("=") ? l.split("=", 2) : [l, l];
              return { label: lbl.trim(), value: (val || lbl).trim() };
            });
          return { label: f.nombre, tableView: true, alwaysEnabled: false,
            type: "select", input: true, key,
            ...(f.defaultValue ? { defaultValue: f.defaultValue } : {}),
            ...COMP_EXTRAS,
            validate: VALIDATE_BASE(f.required),
            data: { values } };
        }

        default: { // text
          const ml = f.maxLength ? parseInt(f.maxLength) : 500;
          return { label: f.nombre, allowMultipleMasks: false, showWordCount: false, showCharCount: false,
            tableView: true, alwaysEnabled: false,
            type: "textfield", input: true, key,
            inputFormat: "plain", encrypted: false,
            ...(f.placeholder ? { placeholder: f.placeholder } : {}),
            ...(f.defaultValue ? { defaultValue: f.defaultValue } : {}),
            ...(f.readOnly ? { disabled: true } : {}),
            ...COMP_EXTRAS,
            validate: VALIDATE_BASE(f.required, { maxLength: ml }) };
        }
      }
    }

    // ── FORMIO JSON BUILDER ───────────────────────────────────────────────────
    function buildFormioJson({ sections, colsPerRow, submitLabel }) {
      const cols  = colsPerRow || 2;
      const width = Math.floor(12 / cols);
      const components = [];
      let colIdx = 1; // contador global de columnas (column1, column2…)

      sections.forEach((sec, si) => {
        const validFields = sec.fields.filter(f => f.nombre.trim());
        if (!validFields.length) return;

        // Checkboxes van directamente en el panel (sin columns wrapper)
        // El resto se agrupan de cols en cols
        const panelComps = [];
        let i = 0;
        while (i < validFields.length) {
          const f = validFields[i];
          if (f.tipo === "checkbox") {
            panelComps.push(buildComponent(f));
            i++;
          } else {
            // Recoge hasta `cols` campos no-checkbox consecutivos
            const rowFields = [];
            while (i < validFields.length && validFields[i].tipo !== "checkbox" && rowFields.length < cols) {
              rowFields.push(validFields[i]); i++;
            }
            panelComps.push({
              label: "Columnas", type: "columns",
              key: `cols_${si}_${Math.floor((i-rowFields.length)/cols)}`,
              input: false, tableView: false, mask: false,
              alwaysEnabled: false, reorder: false,
              properties: {}, customConditional: "", logic: [], attributes: {},
              conditional: COND_EMPTY,
              columns: rowFields.map(rf => ({
                width, offset: 0, push: 0, pull: 0,
                type: "column", input: false, hideOnChildrenHidden: false,
                key: `column${colIdx++}`, tableView: true, label: "Column",
                components: [buildComponent(rf)]
              }))
            });
          }
        }

        components.push({
          label: sec.name, type: "panel",
          key: `panel_${toCamelKey(sec.name) || `sec${si}`}`,
          input: false, tableView: false, collapsible: false,
          reorder: false, properties: {}, customConditional: "",
          logic: [], attributes: {}, conditional: COND_EMPTY,
          components: panelComps
        });
      });

      components.push({
        type: "button", label: submitLabel || "Enviar", key: "submit",
        theme: "primary", input: true, tableView: true
      });

      return { display: "form", settings: {}, components };
    }

    // ── XML BUILDER ───────────────────────────────────────────────────────────
    // Basado en el XML real que importa correctamente en Therefore.
    // <Folders> vacío: el usuario mueve el eForm a la carpeta desde Solution Designer.
    // Sin <FFold>: evita errores de referencia a carpeta inexistente.
    function buildEFormXml({ formName, submitLabel, sections, colsPerRow }) {
      const formio = buildFormioJson({ sections, colsPerRow, submitLabel });
      const fdef   = JSON.stringify(formio, null, 2);
      const formID = formName.replace(/\s+/g,"").replace(/[^A-Za-z0-9]/g,"") || "EForm";
      const formGuid = newGuid();

      return `<?xml version="1.0" encoding="utf-8"?>
<Configuration><Version>570425345</Version><NewImportExport>1</NewImportExport><Categories></Categories><QueryTemplates></QueryTemplates><CaseDefinitions></CaseDefinitions><Folders></Folders><Datatypes></Datatypes><KeywordDictionaries></KeywordDictionaries><Counters></Counters><Templates></Templates><WFProcesses></WFProcesses><UCProfiles></UCProfiles><TreeViews></TreeViews><CloudStorages></CloudStorages><Preprocessors></Preprocessors><Forms></Forms><FormImgs></FormImgs><ReportDefinitions></ReportDefinitions><ReportTemplates></ReportTemplates><PowerBIDataSets></PowerBIDataSets><PowerBITables></PowerBITables><EForms><EForm><FNo>-1</FNo><FVer>1</FVer><FName>${escXml(formName)}</FName><FDef>${fdef}</FDef><DCrea>${dcreaNow()}</DCrea><FCreUs>10</FCreUs><FCreUsNam>admin</FCreUsNam><Id>${formGuid}</Id><FormID>${escXml(formID)}</FormID></EForm></EForms><ESignatureProviders></ESignatureProviders><Roles></Roles><RoleAssignments></RoleAssignments><CommonScripts></CommonScripts><OfficeProfiles></OfficeProfiles><IxProfiles></IxProfiles><Queries></Queries><Users></Users><CaptProfiles></CaptProfiles><References></References><CntConnSrcs></CntConnSrcs><Dashboards></Dashboards><Stamps></Stamps><RetentionPolicies></RetentionPolicies><SmartCaptureProcessors></SmartCaptureProcessors><SmartCaptureQueues></SmartCaptureQueues><DocDownloadProviders></DocDownloadProviders><Credentials></Credentials></Configuration>`;
    }

    // ── CSV PARSER ────────────────────────────────────────────────────────────
    function parseCsv(raw) {
      const lines = raw.split("\n").map(l => l.trim()).filter(Boolean);
      if (!lines.length) return { error: "El texto está vacío." };
      const sep = lines[0].includes(";") ? ";" : ",";
      const headers = lines[0].split(sep).map(h => h.trim().toLowerCase());

      const idx = {
        nombre:      headers.findIndex(h => ["nombre","name","label","etiqueta"].includes(h)),
        fieldkey:    headers.findIndex(h => ["key","fieldkey","fieldid","colname","col"].includes(h)),
        tipo:        headers.findIndex(h => ["tipo","type","typeno"].includes(h)),
        obligatorio: headers.findIndex(h => ["obligatorio","required","requerido"].includes(h)),
        placeholder: headers.findIndex(h => ["placeholder","ayuda","hint"].includes(h)),
        default:     headers.findIndex(h => ["default","defecto","defaultvalue"].includes(h)),
        maxlength:   headers.findIndex(h => ["maxlength","max","longitud","long"].includes(h)),
        seccion:     headers.findIndex(h => ["seccion","sección","section","grupo","group","panel"].includes(h)),
        options:     headers.findIndex(h => ["options","opciones","valores"].includes(h)),
      };

      if (idx.nombre === -1) return { error: "No se encontró la columna 'Nombre'." };

      const sectionMap = {}, sectionOrder = [], warnings = [];

      lines.slice(1).forEach((line, li) => {
        const cols = line.split(sep).map(c => c.trim());
        const nombre = cols[idx.nombre] || "";
        if (!nombre) { warnings.push(`Fila ${li+2}: sin nombre, ignorada.`); return; }

        const fieldKey = idx.fieldkey >= 0 ? (cols[idx.fieldkey] || toCamelKey(nombre)) : toCamelKey(nombre);
        const tipo     = idx.tipo >= 0 ? (TYPE_ALIAS[cols[idx.tipo]?.toLowerCase()] || "text") : "text";
        const required = idx.obligatorio >= 0 ? ["1","si","sí","yes","true"].includes((cols[idx.obligatorio]||"").toLowerCase()) : false;
        const placeholder = idx.placeholder >= 0 ? (cols[idx.placeholder] || "") : "";
        const defaultValue = idx.default >= 0 ? (cols[idx.default] || "") : "";
        const maxLength = idx.maxlength >= 0 ? (cols[idx.maxlength] || "") : "";
        const options   = idx.options >= 0 ? (cols[idx.options] || "").replaceAll("|","\n") : "";
        const seccion   = idx.seccion >= 0 ? (cols[idx.seccion] || "GENERAL").toUpperCase() : "GENERAL";

        if (!sectionMap[seccion]) { sectionMap[seccion] = []; sectionOrder.push(seccion); }
        sectionMap[seccion].push({ id:newGuid(), nombre, fieldKey, tipo, required, readOnly:false, placeholder, defaultValue, maxLength, options });
      });

      if (!sectionOrder.length) return { error: "No se procesó ningún campo válido." };
      const sections = sectionOrder.map(name => ({ id:newGuid(), name, fields: sectionMap[name] }));
      return { sections, warnings };
    }

    // ── STYLES ────────────────────────────────────────────────────────────────
    const S = {
      wrap:       { fontFamily:"'Inter',system-ui,sans-serif", color:"#e6e7eb" },
      header:     { borderBottom:"1px solid rgba(255,255,255,.10)", paddingBottom:"16px", marginBottom:"20px" },
      title:      { fontSize:"20px", fontWeight:700, color:"#9ad1ff", letterSpacing:"-0.3px", margin:0 },
      sub:        { fontSize:"12px", color:"rgba(238,244,255,.55)", marginTop:"4px" },
      grid:       { display:"grid", gridTemplateColumns:"1fr 1fr", gap:"16px" },
      panel:      { background:"linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.04)),rgba(255,255,255,.06)", border:"1px solid rgba(255,255,255,.10)", borderRadius:"8px", padding:"16px", backdropFilter:"blur(14px)", boxShadow:"0 10px 30px rgba(0,0,0,.35)" },
      panelTitle: { fontSize:"11px", fontWeight:600, color:"#9ad1ff", textTransform:"uppercase", letterSpacing:"0.1em", marginBottom:"14px" },
      label:      { display:"block", fontSize:"11px", color:"rgba(238,244,255,.65)", marginBottom:"4px" },
      input:      { width:"100%", background:"rgba(255,255,255,.04)", border:"1px solid rgba(255,255,255,.18)", borderRadius:"8px", padding:"7px 10px", color:"#e6e7eb", fontSize:"13px", boxSizing:"border-box", outline:"none", fontFamily:"inherit" },
      select:     { width:"100%", background:"rgba(255,255,255,.06)", border:"1px solid rgba(255,255,255,.18)", borderRadius:"8px", padding:"7px 10px", color:"#e6e7eb", fontSize:"13px", boxSizing:"border-box", fontFamily:"inherit" },
      row:        { display:"flex", gap:"8px", alignItems:"flex-end", marginBottom:"8px" },
      btn:        { background:"rgba(255,255,255,.06)", border:"1px solid rgba(255,255,255,.14)", borderRadius:"10px", color:"#e6e7eb", fontSize:"12px", padding:"6px 12px", cursor:"pointer", whiteSpace:"nowrap", fontWeight:500 },
      btnDanger:  { background:"rgba(255,80,80,.10)", border:"1px solid rgba(255,80,80,.25)", borderRadius:"10px", color:"#fecaca", fontSize:"12px", padding:"6px 12px", cursor:"pointer" },
      btnGreen:   { background:"rgba(167,243,208,.10)", border:"1px solid rgba(167,243,208,.30)", borderRadius:"10px", color:"#a7f3d0", fontSize:"13px", padding:"8px 16px", cursor:"pointer", fontWeight:600 },
      btnPrimary: { background:"#9ad1ff", border:"none", borderRadius:"10px", color:"#000", fontSize:"13px", padding:"9px 18px", cursor:"pointer", fontWeight:600 },
      toggle:     on => ({ display:"inline-flex", alignItems:"center", gap:"6px", cursor:"pointer", color:on?"#9ad1ff":"rgba(238,244,255,.45)", fontSize:"11px" }),
      sec:        { background:"rgba(0,0,0,.18)", border:"1px solid rgba(255,255,255,.08)", borderRadius:"8px", padding:"12px", marginBottom:"12px" },
      secHeader:  { display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"10px" },
      badge:      { fontSize:"10px", background:"rgba(154,209,255,.12)", color:"#9ad1ff", padding:"2px 7px", borderRadius:"5px", border:"1px solid rgba(154,209,255,.20)" },
    };

    function Toggle({ on, onChange, label }) {
      return (
        <label style={S.toggle(on)} onClick={onChange}>
          <span style={{width:"26px",height:"15px",borderRadius:"8px",background:on?"#9ad1ff":"rgba(255,255,255,.10)",border:"1px solid rgba(255,255,255,.18)",display:"inline-block",position:"relative",flexShrink:0}}>
            <span style={{position:"absolute",top:"2px",left:on?"12px":"2px",width:"10px",height:"10px",borderRadius:"50%",background:on?"#000":"rgba(238,244,255,.4)",transition:"left .15s"}}/>
          </span>
          {label}
        </label>
      );
    }

    // ── CSV IMPORTER ──────────────────────────────────────────────────────────
    function CsvImporter({ onImport }) {
      const [open, setOpen]       = useState(false);
      const [text, setText]       = useState("");
      const [preview, setPreview] = useState(null);

      const handleParse = () => setPreview(parseCsv(text));
      const handleApply = mode => {
        if (!preview || preview.error) return;
        onImport(preview, mode);
        setText(""); setPreview(null); setOpen(false);
      };
      const total = preview && !preview.error
        ? preview.sections.reduce((a,s)=>a+s.fields.length,0) : 0;

      return (
        <div style={{marginBottom:"16px"}}>
          <button style={{...S.btn,width:"100%",display:"flex",justifyContent:"center",gap:"6px"}} onClick={()=>setOpen(o=>!o)}>
            {open?"▲":"▼"} Importar campos desde CSV
          </button>
          {open&&<div style={{...S.panel,marginTop:"8px",borderColor:"rgba(154,209,255,.25)"}}>
            <div style={S.panelTitle}>Importar CSV</div>
            <div style={{fontSize:"11px",color:"rgba(238,244,255,.50)",marginBottom:"10px",lineHeight:"1.8"}}>
              Columnas: <code style={{color:"#a7f3d0",fontFamily:"monospace",fontSize:"11px"}}>Nombre ; Key ; Tipo ; Obligatorio ; Placeholder ; Default ; MaxLength ; Seccion ; Options</code><br/>
              <span style={{color:"rgba(238,244,255,.35)"}}>Solo <b style={{color:"rgba(238,244,255,.6)"}}>Nombre</b> es obligatorio. <b style={{color:"rgba(238,244,255,.6)"}}>Options</b> para select: separadas por <code style={{color:"#a7f3d0"}}>|</code></span>
            </div>
            <textarea
              style={{...S.input,height:"100px",resize:"vertical",fontFamily:"monospace",fontSize:"11px"}}
              value={text} onChange={e=>{setText(e.target.value);setPreview(null);}}
              placeholder={"Nombre;Key;Tipo;Obligatorio;Placeholder;Default;MaxLength;Seccion;Options\nNombre completo;nombre;Text;Si;Tu nombre completo;;100;DATOS PERSONALES\nCurso;curso;Select;Si;;;; ACADÉMICO;1ESO=1 ESO|2ESO=2 ESO"}
            />
            <button style={{...S.btnPrimary,marginTop:"8px",fontSize:"12px",padding:"7px 14px"}} onClick={handleParse} disabled={!text.trim()}>Analizar →</button>
            {preview&&<div style={{marginTop:"10px"}}>
              {preview.error
                ?<div style={{color:"#fecaca",background:"rgba(255,80,80,.12)",border:"1px solid rgba(255,80,80,.25)",padding:"8px 12px",borderRadius:"8px",fontSize:"12px"}}>⚠ {preview.error}</div>
                :<>
                  <div style={{fontSize:"12px",color:"#a7f3d0",marginBottom:"6px"}}>✓ {total} campos · {preview.sections.length} panel(es)</div>
                  <div style={{background:"rgba(0,0,0,.25)",borderRadius:"8px",padding:"8px",marginBottom:"8px",maxHeight:"130px",overflowY:"auto"}}>
                    {preview.sections.map((sec,si)=>(
                      <div key={si} style={{marginBottom:"5px"}}>
                        <div style={{fontSize:"11px",color:"#9ad1ff",fontWeight:600}}>▸ {sec.name}</div>
                        {sec.fields.map((f,fi)=>(
                          <div key={fi} style={{fontSize:"11px",color:"rgba(238,244,255,.55)",paddingLeft:"10px"}}>
                            {f.nombre} <span style={{color:"rgba(238,244,255,.30)"}}>({f.fieldKey} · {f.tipo}{f.required?" · ✱":""})</span>
                          </div>
                        ))}
                      </div>
                    ))}
                  </div>
                  {preview.warnings?.length>0&&<div style={{fontSize:"11px",color:"#ffd166",background:"rgba(255,209,102,.08)",border:"1px solid rgba(255,209,102,.20)",padding:"6px 10px",borderRadius:"8px",marginBottom:"8px"}}>
                    {preview.warnings.map((w,i)=><div key={i}>⚠ {w}</div>)}
                  </div>}
                  <div style={{display:"flex",gap:"8px"}}>
                    <button style={S.btnPrimary} onClick={()=>handleApply("replace")}>Reemplazar</button>
                    <button style={S.btn}        onClick={()=>handleApply("append")}>Añadir al final</button>
                  </div>
                </>}
            </div>}
          </div>}
        </div>
      );
    }

    // ── FIELD ROW ─────────────────────────────────────────────────────────────
    function FieldRow({ field, onChange, onRemove }) {
      const [expanded, setExpanded] = useState(false);
      const isSelect = field.tipo === "select";
      const isText   = field.tipo === "text" || field.tipo === "email";

      const autoKey = toCamelKey(field.nombre);

      return (
        <div style={{background:"rgba(0,0,0,.20)",border:"1px solid rgba(255,255,255,.07)",borderRadius:"8px",padding:"10px",marginBottom:"6px"}}>
          {/* Row principal */}
          <div style={{display:"flex",gap:"6px",flexWrap:"wrap",alignItems:"flex-end"}}>
            <div style={{flex:"3 1 160px"}}>
              <label style={S.label}>Etiqueta</label>
              <input style={S.input} value={field.nombre}
                onChange={e=>{
                  const nombre = e.target.value;
                  const autoK = toCamelKey(nombre);
                  onChange({...field, nombre,
                    fieldKey: field.fieldKey === toCamelKey(field.nombre) ? autoK : field.fieldKey
                  });
                }}
                placeholder="ej. Nombre completo"/>
            </div>
            <div style={{flex:"2 1 110px"}}>
              <label style={S.label}>Key (Form.io)</label>
              <input style={S.input} value={field.fieldKey}
                onChange={e=>onChange({...field,fieldKey:e.target.value.replace(/\s+/g,"").replace(/[^A-Za-z0-9_]/g,"")})}
                placeholder={autoKey}/>
            </div>
            <div style={{flex:"2 1 120px"}}>
              <label style={S.label}>Tipo</label>
              <select style={S.select} value={field.tipo}
                onChange={e=>onChange({...field,tipo:e.target.value})}>
                {FIELD_TYPES.map(t=><option key={t.value} value={t.value}>{t.label}</option>)}
              </select>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"5px",paddingBottom:"2px"}}>
              <Toggle on={field.required}  onChange={()=>onChange({...field,required:!field.required})}  label="Obligatorio"/>
              <Toggle on={field.readOnly}  onChange={()=>onChange({...field,readOnly:!field.readOnly})}   label="Solo lectura"/>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:"5px",paddingBottom:"2px"}}>
              <button style={{...S.btn,fontSize:"11px",padding:"4px 8px"}} onClick={()=>setExpanded(o=>!o)} title="Más opciones">
                {expanded?"▲":"▼"} Más
              </button>
              <button style={{...S.btnDanger,padding:"4px 8px"}} onClick={onRemove} title="Eliminar">✕</button>
            </div>
          </div>

          {/* Opciones expandidas */}
          {expanded&&<div style={{marginTop:"10px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px",borderTop:"1px solid rgba(255,255,255,.06)",paddingTop:"10px"}}>
            <div>
              <label style={S.label}>Placeholder</label>
              <input style={S.input} value={field.placeholder}
                onChange={e=>onChange({...field,placeholder:e.target.value})}
                placeholder="Texto de ayuda…"/>
            </div>
            <div>
              <label style={S.label}>Valor por defecto</label>
              <input style={S.input} value={field.defaultValue}
                onChange={e=>onChange({...field,defaultValue:e.target.value})}
                placeholder=""/>
            </div>
            {isText&&<div>
              <label style={S.label}>Longitud máxima</label>
              <input style={S.input} type="number" value={field.maxLength}
                onChange={e=>onChange({...field,maxLength:e.target.value})}
                placeholder="500"/>
            </div>}
            {isSelect&&<div style={{gridColumn:"1 / -1"}}>
              <label style={S.label}>Opciones (una por línea: <code style={{color:"#a7f3d0",fontFamily:"monospace"}}>valor=Etiqueta</code> o solo etiqueta)</label>
              <textarea style={{...S.input,height:"80px",resize:"vertical",fontFamily:"monospace",fontSize:"11px"}}
                value={field.options}
                onChange={e=>onChange({...field,options:e.target.value})}
                placeholder={"ACTIVO=Activo\nPENDIENTE=Pendiente documentación\nBAJA=Baja"}/>
            </div>}
          </div>}
        </div>
      );
    }

    // ── FORM PREVIEW ──────────────────────────────────────────────────────────
    function FormPreview({ formName, description, submitLabel, sections, colsPerRow }) {
      const cols = colsPerRow || 2;
      const pct  = Math.floor(100 / cols);

      const CTRL = {
        text:     <input type="text"           style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"4px",padding:"5px 8px",fontSize:"12px",background:"#fff"}} readOnly/>,
        email:    <input type="email"          style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"4px",padding:"5px 8px",fontSize:"12px",background:"#fff"}} readOnly/>,
        phone:    <input type="tel"            style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"4px",padding:"5px 8px",fontSize:"12px",background:"#fff"}} readOnly/>,
        date:     <input type="date"           style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"4px",padding:"5px 8px",fontSize:"12px",background:"#fff"}} readOnly/>,
        datetime: <input type="datetime-local" style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"4px",padding:"5px 8px",fontSize:"12px",background:"#fff"}} readOnly/>,
        number:   <input type="number"         style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"4px",padding:"5px 8px",fontSize:"12px",background:"#fff"}} readOnly/>,
        money:    <input type="number" step="0.01" style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"4px",padding:"5px 8px",fontSize:"12px",background:"#fff"}} readOnly/>,
        checkbox: <input type="checkbox" style={{width:"16px",height:"16px",accentColor:"#185FA5"}}/>,
        select:   <select style={{width:"100%",border:"1px solid #d1d5db",borderRadius:"4px",padding:"5px 8px",fontSize:"12px",background:"#fff"}}><option>-- Selecciona --</option></select>,
      };

      return (
        <div style={{background:"#f3f4f6",borderRadius:"8px",fontFamily:"Arial,sans-serif",maxHeight:"560px",overflowY:"auto"}}>
          <div style={{background:"#185FA5",color:"#fff",borderRadius:"6px 6px 0 0",padding:"14px 18px"}}>
            <div style={{fontSize:"15px",fontWeight:700}}>{formName||"Nombre del formulario"}</div>
            {description&&<div style={{fontSize:"11px",opacity:.8,marginTop:"3px"}}>{description}</div>}
          </div>
          <div style={{background:"#fff",border:"1px solid #d1d5db",borderTop:"none",borderRadius:"0 0 6px 6px",padding:"18px"}}>
            {sections.filter(s=>s.fields.some(f=>f.nombre)).map((sec,si)=>(
              <div key={si} style={{marginBottom:"18px"}}>
                {sec.name&&<div style={{fontSize:"11px",fontWeight:700,color:"#374151",textTransform:"uppercase",letterSpacing:".06em",borderBottom:"1px solid #e5e7eb",paddingBottom:"5px",marginBottom:"12px"}}>{sec.name}</div>}
                <div style={{display:"flex",flexWrap:"wrap",gap:"10px"}}>
                  {sec.fields.filter(f=>f.nombre).map((f,fi)=>(
                    <div key={fi} style={{width:`calc(${pct}% - 6px)`,minWidth:"140px",flexGrow:1}}>
                      <label style={{display:"block",fontSize:"12px",fontWeight:600,color:"#374151",marginBottom:"4px"}}>
                        {f.nombre}
                        {f.required&&<span style={{color:"#dc2626",marginLeft:"3px"}}>*</span>}
                      </label>
                      {CTRL[f.tipo]||CTRL.text}
                    </div>
                  ))}
                </div>
              </div>
            ))}
            <button style={{background:"#185FA5",color:"#fff",border:"none",borderRadius:"6px",padding:"9px 22px",fontSize:"13px",fontWeight:600,cursor:"pointer",marginTop:"4px"}}>
              {submitLabel||"Enviar"}
            </button>
          </div>
        </div>
      );
    }

    // ── MAIN APP ──────────────────────────────────────────────────────────────
    function App() {
      const newField   = () => ({ id:newGuid(), nombre:"", fieldKey:"", tipo:"text", required:false, readOnly:false, placeholder:"", defaultValue:"", maxLength:"", options:"" });
      const newSection = (name="GENERAL") => ({ id:newGuid(), name, fields:[newField()] });

      const [formName,    setFormName]    = useState("");
      const [description, setDescription]= useState("");
      const [submitLabel, setSubmitLabel] = useState("Enviar");
      const [colsPerRow,  setColsPerRow]  = useState(2);
      const [sections,    setSections]    = useState([newSection()]);
      const [xml,         setXml]         = useState("");
      const [copied,      setCopied]      = useState(false);
      const [error,       setError]       = useState("");
      const [activeView,  setActiveView]  = useState("editor");

      // Section ops
      const addSection    = ()    => setSections(s=>[...s, newSection("NUEVO PANEL")]);
      const removeSection = i     => setSections(s=>s.filter((_,idx)=>idx!==i));
      const updateSecName = (i,v) => setSections(s=>s.map((sec,idx)=>idx===i?{...sec,name:v.toUpperCase()}:sec));
      const addField      = i     => setSections(s=>s.map((sec,idx)=>idx===i?{...sec,fields:[...sec.fields,newField()]}:sec));
      const removeField   = (si,fi)  => setSections(s=>s.map((sec,idx)=>idx===si?{...sec,fields:sec.fields.filter((_,fIdx)=>fIdx!==fi)}:sec));
      const updateField   = (si,fi,v)=> setSections(s=>s.map((sec,idx)=>idx===si?{...sec,fields:sec.fields.map((f,fIdx)=>fIdx===fi?v:f)}:sec));

      // CSV import
      const handleCsvImport = ({ sections: newSecs }, mode) => {
        const mapped = newSecs.map(s=>({ id:newGuid(), name:s.name, fields:s.fields }));
        if (mode === "replace") {
          setSections(mapped);
        } else {
          setSections(prev => {
            const merged = [...prev];
            mapped.forEach(ns => {
              const ex = merged.find(s=>s.name===ns.name);
              if (ex) ex.fields = [...ex.fields, ...ns.fields]; else merged.push(ns);
            });
            return merged;
          });
        }
        setXml(""); setError("");
      };

      // Generate
      const generate = () => {
        setError("");
        if (!formName.trim()) { setError("El nombre del formulario es obligatorio."); return; }
        const total = sections.flatMap(s=>s.fields).filter(f=>f.nombre.trim()).length;
        if (total === 0) { setError("Añade al menos un campo."); return; }
        setXml(buildEFormXml({ formName:formName.trim(), submitLabel:submitLabel.trim()||"Enviar", sections, colsPerRow }));
      };

      const copy = () => {
        const fb = () => { const ta=document.createElement("textarea"); ta.value=xml; ta.style.cssText="position:fixed;opacity:0"; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); setCopied(true); setTimeout(()=>setCopied(false),2000); };
        if (navigator.clipboard?.writeText) navigator.clipboard.writeText(xml).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}).catch(fb); else fb();
      };

      const download = () => {
        const a = document.createElement("a");
        a.href = "data:application/xml;charset=utf-8," + encodeURIComponent(xml);
        a.download = (formName.trim().replace(/\s+/g,"_").replace(/[^A-Za-z0-9_]/g,"")||"eform") + "_therefore.xml";
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      };

      const totalFields = sections.flatMap(s=>s.fields).filter(f=>f.nombre.trim()).length;

      return (
        <div style={S.wrap}>
          {/* HEADER */}
          <div style={{...S.header,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <h1 style={S.title}>📋 Therefore™ eForms Builder</h1>
              <p style={S.sub}>Genera el XML de importación de eForms para Therefore Solution Designer · Form.io JSON · v2.0</p>
            </div>
            <div style={{display:"flex",gap:"8px"}}>
              {["editor","preview"].map(v=>(
                <button key={v} onClick={()=>setActiveView(v)} style={{...S.btn,borderColor:activeView===v?"#9ad1ff":"rgba(255,255,255,.14)",background:activeView===v?"rgba(154,209,255,.15)":"rgba(255,255,255,.06)",color:activeView===v?"#9ad1ff":"#e6e7eb"}}>
                  {v==="editor"?"✎ Editor":"👁 Preview"}
                </button>
              ))}
            </div>
          </div>

          {/* IDENTIDAD */}
          <div style={{...S.panel,marginBottom:"16px"}}>
            <div style={S.panelTitle}>Identidad del formulario</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"12px"}}>
              <div>
                <label style={S.label}>Nombre del formulario *</label>
                <input style={S.input} value={formName} onChange={e=>setFormName(e.target.value)} placeholder="ej. Solicitud de documentos"/>
              </div>
              <div>
                <label style={S.label}>Texto botón enviar</label>
                <input style={S.input} value={submitLabel} onChange={e=>setSubmitLabel(e.target.value)} placeholder="Enviar"/>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr auto",gap:"12px",alignItems:"end"}}>
              <div>
                <label style={S.label}>Descripción visible en el formulario <span style={{color:"rgba(238,244,255,.35)"}}>(opcional)</span></label>
                <input style={S.input} value={description} onChange={e=>setDescription(e.target.value)} placeholder="Rellene este formulario para…"/>
              </div>
              <div>
                <label style={S.label}>Columnas por fila</label>
                <div style={{display:"flex",gap:"4px"}}>
                  {[1,2,3,4].map(n=>(
                    <button key={n} onClick={()=>setColsPerRow(n)} style={{...S.btn,padding:"6px 12px",borderColor:colsPerRow===n?"#9ad1ff":"rgba(255,255,255,.14)",background:colsPerRow===n?"rgba(154,209,255,.15)":"rgba(255,255,255,.06)",color:colsPerRow===n?"#9ad1ff":"#e6e7eb"}}>
                      {n}
                    </button>
                  ))}
                </div>
              </div>
            </div>
          </div>

          {activeView==="preview" ? (
            <div style={S.panel}>
              <div style={S.panelTitle}>Preview del formulario web</div>
              <FormPreview formName={formName} description={description} submitLabel={submitLabel} sections={sections} colsPerRow={colsPerRow}/>
            </div>
          ) : (
            <div style={S.grid}>
              {/* LEFT — campos */}
              <div>
                <CsvImporter onImport={handleCsvImport}/>
                <div style={S.panel}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                    <span style={S.panelTitle}>Paneles y campos <span style={{...S.badge,marginLeft:"6px"}}>{totalFields} campos</span></span>
                    <button style={S.btn} onClick={addSection}>+ Panel</button>
                  </div>
                  {sections.map((sec,si)=>(
                    <div key={sec.id} style={S.sec}>
                      <div style={S.secHeader}>
                        <input style={{...S.input,fontWeight:600,color:"#9ad1ff",width:"auto",flex:1,marginRight:"8px"}}
                          value={sec.name} onChange={e=>updateSecName(si,e.target.value)} placeholder="NOMBRE DEL PANEL"/>
                        <span style={{...S.badge,marginRight:"8px"}}>{sec.fields.filter(f=>f.nombre).length} campos</span>
                        {sections.length>1&&<button style={S.btnDanger} onClick={()=>removeSection(si)}>✕</button>}
                      </div>
                      {sec.fields.map((f,fi)=>(
                        <FieldRow key={f.id} field={f} onChange={v=>updateField(si,fi,v)} onRemove={()=>removeField(si,fi)}/>
                      ))}
                      <button style={{...S.btn,marginTop:"4px"}} onClick={()=>addField(si)}>+ Campo</button>
                    </div>
                  ))}
                </div>
              </div>

              {/* RIGHT */}
              <div style={{display:"flex",flexDirection:"column",gap:"16px"}}>
                {/* Info Form.io */}
                <div style={S.panel}>
                  <div style={S.panelTitle}>Estructura del XML</div>
                  <div style={{fontSize:"12px",color:"rgba(238,244,255,.55)",lineHeight:"1.75"}}>
                    <p style={{marginBottom:"8px"}}>Therefore eForms usa <strong style={{color:"#9ad1ff"}}>Form.io</strong> como motor de formularios. El XML contiene el JSON de Form.io dentro del nodo <code style={{background:"rgba(154,209,255,.10)",padding:"1px 5px",borderRadius:"3px",color:"#a7f3d0",fontFamily:"monospace"}}>&lt;FDef&gt;</code>.</p>
                    <p style={{marginBottom:"8px"}}>Cada <strong style={{color:"#e6e7eb"}}>Panel</strong> → componente <code style={{background:"rgba(154,209,255,.10)",padding:"1px 5px",borderRadius:"3px",color:"#a7f3d0",fontFamily:"monospace"}}>panel</code> de Form.io. Cada fila de campos → <code style={{background:"rgba(154,209,255,.10)",padding:"1px 5px",borderRadius:"3px",color:"#a7f3d0",fontFamily:"monospace"}}>columns</code>.</p>
                    <p style={{marginBottom:"0"}}>El <strong style={{color:"#9ad1ff"}}>Key</strong> de cada campo debe coincidir con el <code style={{background:"rgba(154,209,255,.10)",padding:"1px 5px",borderRadius:"3px",color:"#a7f3d0",fontFamily:"monospace"}}>FieldID</code> de la categoría vinculada en Therefore.</p>
                  </div>
                </div>

                {/* Generar */}
                <div style={S.panel}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                    <span style={S.panelTitle}>Generar XML</span>
                    <span style={S.badge}>{totalFields} campos</span>
                  </div>
                  {error&&<div style={{color:"#fecaca",fontSize:"12px",marginBottom:"10px",background:"rgba(255,80,80,.12)",border:"1px solid rgba(255,80,80,.25)",padding:"8px 12px",borderRadius:"8px"}}>⚠ {error}</div>}
                  <button style={S.btnPrimary} onClick={generate}>Generar XML →</button>
                  {xml&&<div style={{marginTop:"14px"}}>
                    <div style={{display:"flex",gap:"8px",marginBottom:"8px",flexWrap:"wrap"}}>
                      <button style={S.btnGreen}  onClick={copy}>{copied?"✓ Copiado":"📋 Copiar XML"}</button>
                      <button style={S.btn}        onClick={download}>⬇ Descargar .xml</button>
                      <button style={S.btn}        onClick={()=>{const w=window.open("");w.document.write("<pre style='word-break:break-all;font-size:11px'>"+xml.replace(/</g,"&lt;")+"</pre>");w.document.title="eform.xml";}}>🔗 Nueva pestaña</button>
                    </div>
                    <div style={{fontSize:"11px",color:"rgba(238,244,255,.40)",marginBottom:"6px"}}>{xml.length.toLocaleString()} caracteres</div>
                    <textarea readOnly style={{...S.input,height:"120px",resize:"vertical",fontFamily:"monospace",fontSize:"11px",color:"#a7f3d0"}} value={xml} onClick={e=>e.target.select()}/>
                  </div>}
                </div>

                {/* Checklist */}
                <div style={S.panel}>
                  <div style={S.panelTitle}>Checklist de publicación</div>
                  <div style={{fontSize:"12px",color:"rgba(238,244,255,.55)",lineHeight:"2.1"}}>
                    {[
                      "Importar el XML en Solution Designer",
                      "Verificar que el Key de cada campo coincide con el FieldID de la categoría",
                      "Configurar la categoría vinculada si no existe",
                      "Publicar desde Herramientas → Publicar eForms",
                      "Verificar la URL de publicación en IIS",
                      "Probar envío antes de distribuir el enlace",
                    ].map((item,i)=>(
                      <div key={i} style={{display:"flex",gap:"8px"}}>
                        <span style={{color:"rgba(154,209,255,.45)",flexShrink:0}}>☐</span>
                        <span>{item}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            </div>
          )}

          <div style={{marginTop:"16px",fontSize:"11px",color:"rgba(238,244,255,.25)",borderTop:"1px solid rgba(255,255,255,.08)",paddingTop:"12px"}}>
            Therefore eForms Builder v2.0 · Aneker · Genera Form.io JSON nativo para Therefore · Próximo: CSS personalizado, validaciones avanzadas
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
