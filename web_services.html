<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Servidores Web · TheJ ToolBox</title>
  <style>
    body {
      margin: 0;
      padding: 1rem;
      background: #2A2D34;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto;
      color: rgba(238,244,255,.95);
    }
    .ws-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .ws-header h1 {
      margin: 0;
      color: #004894;
      font-size: 1.5rem;
    }
    .ws-buttons {
      display: flex;
      gap: 0.5rem;
    }
    .action-btn {
      padding: 0.35rem 0.65rem;
      background: transparent;
      border: 1.5px solid #004894;
      border-radius: 5px;
      color: #004894;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      height: auto;
      line-height: 1.3;
    }
    .action-btn:hover:not(:disabled) {
      background: #004894;
      color: white;
    }
    .action-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      border-color: rgba(0, 72, 148, 0.2);
    }
    .action-btn.danger {
      border-color: #d32f2f;
      color: #d32f2f;
    }
    .action-btn.danger:hover:not(:disabled) {
      background: #d32f2f;
      color: white;
    }
    .glass-table {
      width: 100%;
      border-collapse: collapse;
      background: #1F1F1F;
      border-radius: 6px;
      overflow: hidden;
    }
    .glass-table thead {
      background: #1F1F1F;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .glass-table th {
      padding: 6px 10px;
      text-align: left;
      font-weight: 600;
      font-size: 0.8rem;
      color: #004894;
    }
    .glass-table td {
      padding: 6px 10px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .glass-table tbody tr {
      cursor: pointer;
      transition: background .15s ease;
    }
    .glass-table tbody tr:hover {
      background: rgba(0, 72, 148, 0.15);
    }
    .glass-table tbody tr.selected {
      background: rgba(0, 72, 148, 0.25);
      box-shadow: inset 0 0 0 1px rgba(0, 72, 148, 0.5);
    }
    .error-msg {
      color: #fecaca;
      font-size: 12px;
      margin-top: 0.5rem;
      background: rgba(255,80,80,.12);
      border: 1px solid rgba(255,80,80,.25);
      padding: 8px 12px;
      border-radius: 8px;
      display: none;
    }
    .glass-modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.7);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }
    .glass-modal {
      background: rgba(20,30,50,0.8);
      border: 1px solid rgba(40,215,199,.2);
      border-radius: 12px;
      width: 480px;
      max-width: 95vw;
    }
    .glass-modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .glass-modal-title {
      font-weight: 600;
      font-size: 1rem;
    }
    .glass-modal-x {
      background: none;
      border: none;
      color: rgba(238,244,255,.6);
      font-size: 1.2rem;
      cursor: pointer;
    }
    .glass-modal-body {
      padding: 16px 20px;
    }
    .glass-modal-field {
      margin-bottom: 10px;
    }
    .glass-modal-label {
      display: block;
      font-size: 13px;
      margin-bottom: 4px;
      font-weight: 500;
    }
    .glass-modal-input {
      width: 100%;
      padding: 0.35rem 0.65rem;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 5px;
      background: rgba(0,0,0,.3);
      color: #e6e7eb;
      font-size: 14px;
      box-sizing: border-box;
    }
    .glass-modal-actions {
      display: flex;
      gap: 0.5rem;
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,.1);
      justify-content: flex-end;
    }
    .glass-modal-actions button {
      padding: 0.5rem 1rem;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,.2);
      background: transparent;
      color: rgba(238,244,255,.9);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .glass-modal-ok {
      background: #004894;
      border-color: #004894;
      color: white;
    }
  </style>
</head>
<body>

  <div class="ws-header">
    <h1>Servidores Web</h1>
    <div class="ws-buttons">
      <button class="action-btn" onclick="openNewServerForm()">➕ Añadir</button>
      <button class="action-btn" id="btnEdit" disabled onclick="openEditServer()">✏️ Editar</button>
      <button class="action-btn" id="btnTest" disabled onclick="testServer()">🧪 Probar</button>
      <button class="action-btn danger" id="btnDelete" disabled onclick="deleteServer()">🗑️ Eliminar</button>
    </div>
  </div>

  <div style="overflow-x: auto;">
    <table class="glass-table">
      <thead>
        <tr>
          <th>URL Base</th>
          <th>Tenant</th>
          <th>Usuario</th>
          <th>Creación</th>
        </tr>
      </thead>
      <tbody id="serversTable"></tbody>
    </table>
  </div>

  <div id="errorMsg" class="error-msg"></div>

  <script>
    window.ENV = {
      SUPABASE_URL: "https://osudezxnludhewdxeaks.supabase.co",
      SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zdWRlenhubHVkaGV3ZHhlYWtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ0OTQxMTksImV4cCI6MjA4MDA3MDExOX0.RLkgHZ8FHaSzXt18Zag3QHmkBE1SBjfbZ0wSUmh3sxo"
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const client = supabase.createClient(window.ENV.SUPABASE_URL, window.ENV.SUPABASE_ANON_KEY);

    let allServers = [];
    let selectedServerId = null;

    async function init() {
      try {
        const { data: { user } } = await client.auth.getUser();
        if (!user) {
          window.location.href = 'login.html';
          return;
        }
        loadServers();
      } catch (e) {
        console.error(e);
        showError('Error de autenticación');
      }
    }

    async function loadServers() {
      try {
        const { data, error } = await client
          .from('web_services')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;
        allServers = data || [];
        renderTable(allServers);
      } catch (e) {
        showError(e.message);
      }
    }

    function renderTable(servers) {
      const tbody = document.getElementById('serversTable');
      tbody.innerHTML = servers.map(s => `
        <tr class="server-row" data-id="${s.id}">
          <td>${escapeHtml(s.url_base)}</td>
          <td>${escapeHtml(s.tenant_name || '-')}</td>
          <td>${escapeHtml(s.username)}</td>
          <td>${new Date(s.created_at).toLocaleDateString()}</td>
        </tr>
      `).join('');

      document.querySelectorAll('.server-row').forEach(row => {
        row.addEventListener('click', () => selectServer(row.dataset.id));
      });
    }

    function selectServer(id) {
      selectedServerId = id;
      document.querySelectorAll('.server-row').forEach(r => r.classList.remove('selected'));
      document.querySelector(`[data-id="${id}"]`)?.classList.add('selected');
      updateButtonsState();
    }

    function updateButtonsState() {
      const btnEdit = document.getElementById('btnEdit');
      const btnTest = document.getElementById('btnTest');
      const btnDelete = document.getElementById('btnDelete');

      if (selectedServerId) {
        btnEdit.disabled = false;
        btnTest.disabled = false;
        btnDelete.disabled = false;
      } else {
        btnEdit.disabled = true;
        btnTest.disabled = true;
        btnDelete.disabled = true;
      }
    }

    function escapeHtml(str) {
      return String(str || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = 'block';
    }

    function hideError() {
      document.getElementById('errorMsg').style.display = 'none';
    }

    function getModalValue(id) {
      return document.getElementById(id)?.value?.trim() || '';
    }

    window.openNewServerForm = function() {
      const overlay = document.createElement('div');
      overlay.className = 'glass-modal-overlay';
      overlay.id = 'modalOverlay';
      overlay.innerHTML = `
        <div class="glass-modal">
          <div class="glass-modal-head">
            <div class="glass-modal-title">Nuevo servidor</div>
            <button class="glass-modal-x" onclick="closeModal()">✕</button>
          </div>
          <div class="glass-modal-body">
            <div class="glass-modal-field">
              <label class="glass-modal-label">URL Base *</label>
              <input class="glass-modal-input" id="modal-url" type="text" placeholder="https://..." />
            </div>
            <div class="glass-modal-field">
              <label class="glass-modal-label">Tenant</label>
              <input class="glass-modal-input" id="modal-tenant" type="text" />
            </div>
            <div class="glass-modal-field">
              <label class="glass-modal-label">Usuario *</label>
              <input class="glass-modal-input" id="modal-user" type="text" />
            </div>
            <div class="glass-modal-field">
              <label class="glass-modal-label">Password</label>
              <input class="glass-modal-input" id="modal-pass" type="password" />
            </div>
            <div id="modal-error" class="error-msg"></div>
          </div>
          <div class="glass-modal-actions">
            <button onclick="closeModal()">Cancelar</button>
            <button class="glass-modal-ok" onclick="saveNewServer()">💾 Guardar</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      document.getElementById('modal-url').focus();
    };

    window.saveNewServer = async function() {
      const url_base = getModalValue('modal-url');
      const tenant_name = getModalValue('modal-tenant');
      const username = getModalValue('modal-user');
      const password = getModalValue('modal-pass');
      const errorEl = document.getElementById('modal-error');

      if (!url_base || !username) {
        errorEl.style.display = 'block';
        errorEl.textContent = 'URL Base y Usuario son obligatorios';
        return;
      }

      try {
        const { error } = await client.from('web_services').insert([{
          url_base, tenant_name, username, password
        }]);

        if (error) throw error;
        closeModal();
        loadServers();
      } catch (e) {
        errorEl.style.display = 'block';
        errorEl.textContent = e.message;
      }
    };

    window.openEditServer = async function() {
      if (!selectedServerId) return;

      const server = allServers.find(s => s.id === selectedServerId);
      if (!server) return;

      const overlay = document.createElement('div');
      overlay.className = 'glass-modal-overlay';
      overlay.id = 'modalOverlay';
      overlay.innerHTML = `
        <div class="glass-modal">
          <div class="glass-modal-head">
            <div class="glass-modal-title">Editar servidor</div>
            <button class="glass-modal-x" onclick="closeModal()">✕</button>
          </div>
          <div class="glass-modal-body">
            <div class="glass-modal-field">
              <label class="glass-modal-label">URL Base *</label>
              <input class="glass-modal-input" id="modal-url" type="text" value="${escapeHtml(server.url_base)}" />
            </div>
            <div class="glass-modal-field">
              <label class="glass-modal-label">Tenant</label>
              <input class="glass-modal-input" id="modal-tenant" type="text" value="${escapeHtml(server.tenant_name || '')}" />
            </div>
            <div class="glass-modal-field">
              <label class="glass-modal-label">Usuario *</label>
              <input class="glass-modal-input" id="modal-user" type="text" value="${escapeHtml(server.username)}" />
            </div>
            <div class="glass-modal-field">
              <label class="glass-modal-label">Password</label>
              <input class="glass-modal-input" id="modal-pass" type="password" value="${escapeHtml(server.password || '')}" />
            </div>
            <div id="modal-error" class="error-msg"></div>
          </div>
          <div class="glass-modal-actions">
            <button onclick="closeModal()">Cancelar</button>
            <button class="glass-modal-ok" onclick="saveEditServer()">💾 Guardar</button>
          </div>
        </div>
      `;
      document.body.appendChild(overlay);
      document.getElementById('modal-url').focus();
    };

    window.saveEditServer = async function() {
      const url_base = getModalValue('modal-url');
      const tenant_name = getModalValue('modal-tenant');
      const username = getModalValue('modal-user');
      const password = getModalValue('modal-pass');
      const errorEl = document.getElementById('modal-error');

      if (!url_base || !username) {
        errorEl.style.display = 'block';
        errorEl.textContent = 'URL Base y Usuario son obligatorios';
        return;
      }

      try {
        const { error } = await client
          .from('web_services')
          .update({ url_base, tenant_name, username, password })
          .eq('id', selectedServerId);

        if (error) throw error;
        closeModal();
        loadServers();
      } catch (e) {
        errorEl.style.display = 'block';
        errorEl.textContent = e.message;
      }
    };

    window.testServer = function() {
      alert('Función de test pendiente.');
    };

    window.deleteServer = async function() {
      if (!selectedServerId) return;
      if (!confirm('¿Eliminar este servidor?')) return;

      try {
        const { error } = await client
          .from('web_services')
          .delete()
          .eq('id', selectedServerId);

        if (error) throw error;
        selectedServerId = null;
        loadServers();
      } catch (e) {
        showError(e.message);
      }
    };

    window.closeModal = function() {
      document.getElementById('modalOverlay')?.remove();
    };

    init();
  </script>

</body>
</html>
