<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar contraseña · TheJ ToolBox</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="app login-page">

    <form id="forgot-form" class="login-box">

      <img src="assets/images/logo.png" alt="Logo" class="login-logo" />

      <h1>Recuperar contraseña</h1>

      <p style="text-align:center; margin-top:-10px; margin-bottom:20px; color:var(--txt-2);">
        Introduce tu correo y recibirás un enlace para restaurarla.
      </p>

      <!-- MENSAJE DE ERROR -->
      <div id="forgot-error" class="error-box"></div>

      <input id="email" type="email" placeholder="Correo electrónico" required />

      <button type="submit">Enviar enlace</button>

      <div class="loader" id="forgot-loader"></div>

      <div class="login-links" style="margin-top:20px;">
        <a href="login.html">← Volver al inicio de sesión</a>
      </div>

    </form>

  </div>

  <!-- SUPABASE -->
  <script>
    // Inject environment variables before Supabase initialization
    window.ENV = {
      SUPABASE_URL: "https://osudezxnludhewdxeaks.supabase.co",
      SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zdWRlenhubHVkaGV3ZHhlYWtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjQ0OTQxMTksImV4cCI6MjA4MDA3MDExOX0.RLkgHZ8FHaSzXt18Zag3QHmkBE1SBjfbZ0wSUmh3sxo"
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/supabase.js"></script>

  <!-- LÓGICA -->
  <script>
    const form = document.getElementById("forgot-form");
    const errorBox = document.getElementById("forgot-error");
    const loader = document.getElementById("forgot-loader");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      errorBox.style.display = "none";
      loader.style.display = "block";

      const email = document.getElementById("email").value.trim();

      try {
        const { error } = await client.auth.resetPasswordForEmail(email, {
          redirectTo: window.location.origin + "/reset.html"
        });

        if (error) throw error;

        errorBox.style.display = "block";
        errorBox.style.color = "var(--success)";
        errorBox.textContent = "Email enviado correctamente ✔";

      } catch (err) {
        errorBox.style.display = "block";
        errorBox.style.color = "var(--danger)";
        errorBox.textContent = err.message;

      } finally {
        loader.style.display = "none";
      }
    });
  </script>

</body>
</html>
