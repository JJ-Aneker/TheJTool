    // ── COLOR HELPERS ─────────────────────────────────────────────────────────
    const bgr = (r, g, b) => b * 65536 + g * 256 + r;

    function newGuid() {
      return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === "x" ? r : (r & 0x3 | 0x8)).toString(16).toUpperCase();
      });
    }

    function foreignTableName(tableName) {
      const camel = tableName.split("_").map(p => p.charAt(0).toUpperCase() + p.slice(1).toLowerCase()).join("");
      return `TheIxTable_${camel}_Hist`;
    }

    function toCamel(tableName) {
      return tableName.split("_").map(p => p.charAt(0).toUpperCase() + p.slice(1).toLowerCase()).join("");
    }

    function hexToBgr(hex) {
      const r = parseInt(hex.slice(1,3),16);
      const g = parseInt(hex.slice(3,5),16);
      const b = parseInt(hex.slice(5,7),16);
      return bgr(r, g, b);
    }

    function bgrToHex(val) {
      const b = (val >> 16) & 0xff;
      const g = (val >> 8) & 0xff;
      const r = val & 0xff;
      return "#" + [r,g,b].map(x => x.toString(16).padStart(2,"0")).join("");
    }

    const PALETTES = {

      "Rojo Institucional":  { secBg: bgr(153,27,27),   secText: bgr(255,255,255), hdrBg: bgr(153,27,27),   hdrText: bgr(255,255,255), hdrSub: bgr(254,202,202), hdrMed: bgr(120,20,20),  dlgBg: bgr(245,240,240), tabBg: bgr(192,192,192), fieldBg: bgr(255,255,255), fieldText: bgr(0,0,0),     labelColor: bgr(55,65,81)  },

      "Morado":              { secBg: bgr(88,28,135),   secText: bgr(255,255,255), hdrBg: bgr(88,28,135),   hdrText: bgr(255,255,255), hdrSub: bgr(233,213,255), hdrMed: bgr(59,7,100),   dlgBg: bgr(245,240,250), tabBg: bgr(192,192,192), fieldBg: bgr(255,255,255), fieldText: bgr(0,0,0),     labelColor: bgr(55,65,81)  },
    };

    // ── FIELD TYPES ───────────────────────────────────────────────────────────
    // NOTE: TypeNo 11 (Memo) does NOT exist in Therefore.
    // Use String (1) with Length 4000 instead.
    const FIELD_TYPES = [
      { value: "1",  label: "Texto (String)" },
      { value: "3",  label: "Fecha (Date)" },
      { value: "7",  label: "Fecha y hora (Timestamp)" },
      { value: "2",  label: "Número entero (Integer)" },
      { value: "5",  label: "Importe (Money)" },
      { value: "6",  label: "Lógico (Checkbox)" },
      { value: "15", label: "Lista desplegable (Lookup)" },
    ];

    // Maps CSV type aliases → TypeNo. Memo/textarea → String(4000)
    const TYPE_ALIAS = {
      "string":"1","texto":"1","text":"1","str":"1","varchar":"1",
      "date":"3","fecha":"3",
      "timestamp":"7","datetime":"7","fecha y hora":"7",
      "integer":"2","entero":"2","int":"2","número":"2","numero":"2",
      "float":"2","decimal":"2","double":"2","número decimal":"2",
      "money":"5","importe":"5",
      "logical":"6","lógico":"6","logico":"6","checkbox":"6","bool":"6","boolean":"6",
      // Memo → String, length forced to 4000 in parseCsv
      "memo":"1","texto largo":"1","textarea":"1","longtext":"1","observaciones":"1",
      "lookup":"15","lista":"15","combo":"15","desplegable":"15",
    };
    const MEMO_ALIASES = new Set(["memo","texto largo","textarea","longtext","observaciones"]);

    // ── TEMPLATE MANAGER COMPONENT ────────────────────────────────────────────
    function TemplateManager({ onLoad, categoriesToSave, activeCatName }) {
      const [templates, setTemplates] = useState([]);
      const [loading, setLoading]     = useState(false);
      const [saving, setSaving]       = useState(false);
      const [selectedId, setSelectedId] = useState("");
      const [open, setOpen]           = useState(false);
      const [saveOpen, setSaveOpen]   = useState(false);
      const [saveName, setSaveName]   = useState("");
      const [saveDesc, setSaveDesc]   = useState("");
      const [msg, setMsg]             = useState(null); // {type:"ok"|"err", text}

      const flash = (type, text) => { setMsg({type,text}); setTimeout(()=>setMsg(null), 3500); };

      // Convierte las categorías actuales a CSV para guardar
      function categoriesToCsv(cats) {
        const rows = ["Categoria;Nombre;Colname;Tipo;Long;Seccion"];
        cats.forEach(cat => {
          cat.sections.forEach(sec => {
            sec.fields.filter(f=>f.name.trim()).forEach(f => {
              const tipo = f.typeno==="1"?"String":f.typeno==="2"?"Integer":f.typeno==="3"?"Date":f.typeno==="5"?"Money":f.typeno==="6"?"Boolean":f.typeno==="7"?"Timestamp":f.typeno==="15"?"Lookup":"String";
              rows.push([cat.catName, f.name, f.colname, tipo, f.length||"", sec.name].join(";"));
            });
          });
        });
        return rows.join("\n");
      }

      const loadList = async () => {
        setLoading(true);
        const { data, error } = await sb.from("therefore_templates").select("id,name,description").order("name");
        setLoading(false);
        if (error) { flash("err", "Error cargando plantillas: " + error.message); return; }
        setTemplates(data || []);
      };

      const handleOpen = () => { if (!open) loadList(); setOpen(o=>!o); };

      const handleLoad = async () => {
        if (!selectedId) return;
        setLoading(true);
        const { data, error } = await sb.from("therefore_templates").select("csv_data").eq("id", selectedId).single();
        setLoading(false);
        if (error || !data) { flash("err", "No se pudo cargar la plantilla."); return; }
        const parsed = parseCsv(data.csv_data);
        if (parsed.error) { flash("err", "CSV inválido: " + parsed.error); return; }
        onLoad(parsed);
        flash("ok", "Plantilla cargada.");
      };

      const handleDelete = async () => {
        if (!selectedId) return;
        const tpl = templates.find(t=>t.id===selectedId);
        if (!confirm(`¿Eliminar la plantilla "${tpl?.name}"?`)) return;
        const { error } = await sb.from("therefore_templates").delete().eq("id", selectedId);
        if (error) { flash("err", "Error al eliminar: " + error.message); return; }
        setSelectedId("");
        flash("ok", "Plantilla eliminada.");
        loadList();
      };

      const handleSave = async () => {
        if (!saveName.trim()) return;
        setSaving(true);
        const csv_data = categoriesToCsv(categoriesToSave);
        const { error } = await sb.from("therefore_templates").insert({ name: saveName.trim(), description: saveDesc.trim()||null, csv_data });
        setSaving(false);
        if (error) { flash("err", "Error al guardar: " + error.message); return; }
        setSaveOpen(false); setSaveName(""); setSaveDesc("");
        flash("ok", "Plantilla guardada.");
        if (open) loadList();
      };

      return (
        <div style={{marginBottom:"16px"}}>

          <div style={{display:"flex",gap:"8px",flexWrap:"wrap"}}>

              {open?"▲":"▼"} {loading?"Cargando…":"Colección de plantillas"}
            </button>
            <button style={{...S.btnGreen,fontSize:"12px",padding:"6px 14px"}} onClick={()=>{setSaveName(activeCatName||"");setSaveOpen(o=>!o);}}>

                ))}

              <div style={{display:"flex",gap:"8px"}}>
                <button style={S.btnPrimary} onClick={handleLoad} disabled={!selectedId||loading}>

          {/* Panel guardar */}
          {saveOpen&&<div style={{...S.panel,marginTop:"8px",borderColor:"rgba(167,243,208,.25)"}}>
            <div style={S.panelTitle}>Guardar plantilla actual</div>
            <div style={{display:"grid",gap:"10px"}}>
              <div>
                <label style={S.label}>Nombre *</label>

              </div>

                <label style={S.label}>Descripción <span style={{color:"rgba(238,244,255,.35)"}}>(opcional)</span></label>
                <input style={S.input} value={saveDesc} onChange={e=>setSaveDesc(e.target.value)} placeholder="ej. Plantilla para facturas de proveedor con pestañas"/>
              </div>
              <div style={{fontSize:"11px",color:"rgba(238,244,255,.40)"}}>

                <button style={S.btnPrimary} onClick={handleSave} disabled={!saveName.trim()||saving}>
                  {saving?"Guardando…":"Guardar"}

              </div>
            </div>
          </div>}

    // ── CSV PARSER ────────────────────────────────────────────────────────────
    // Supports optional "Categoria" column for multi-category import.
    // Returns { categoryGroups: [{ catName, sections }], warnings, isMulti }
    function parseCsv(raw) {
      const lines = raw.split("\n").map(l => l.trim()).filter(Boolean);
      if (lines.length === 0) return { error: "El texto está vacío." };
      const sep = lines[0].includes(";") ? ";" : ",";
      const headers = lines[0].split(sep).map(h => h.trim().toLowerCase());

      const idx = {
        nombre:    headers.findIndex(h => ["nombre","name"].includes(h)),
        colname:   headers.findIndex(h => ["colname","col","columna"].includes(h)),
        tipo:      headers.findIndex(h => ["tipo","type","typeno"].includes(h)),
        long:      headers.findIndex(h => ["long","length","longitud"].includes(h)),
        seccion:   headers.findIndex(h => ["seccion","sección","section"].includes(h)),
        categoria: headers.findIndex(h => ["categoria","categoría","category"].includes(h)),
      };

      if (idx.nombre === -1) return { error: "No se encontró la columna 'Nombre'." };

      const isMulti = idx.categoria >= 0;
      // catGroup → sectionName → fields[]
      const catMap = {};
      const catOrder = [];
      const warnings = [];

      const dataLines = lines[0].toLowerCase().includes("nombre") ? lines.slice(1) : lines;

      dataLines.forEach((line, li) => {
        if (!line.trim()) return;
        const cols = line.split(sep).map(c => c.trim());
        const nombre = cols[idx.nombre] || "";
        if (!nombre) { warnings.push(`Fila ${li + 2}: sin nombre, ignorada.`); return; }

        let colname = idx.colname >= 0 ? (cols[idx.colname] || "") : "";
        if (!colname) colname = nombre.replace(/\s+/g,"_").replace(/[^A-Za-z0-9_]/g,"").toUpperCase().slice(0,30);
        else colname = colname.toUpperCase().slice(0,30);

        // Resolve type
        let typeno = "1";
        let length = "100";
        if (idx.tipo >= 0 && cols[idx.tipo]) {
          const rawType = cols[idx.tipo].trim().toLowerCase();
          if (MEMO_ALIASES.has(rawType)) {
            typeno = "1";
            length = "4000";
          } else {
            typeno = TYPE_ALIAS[rawType] || (["1","2","3","5","6","7","15"].includes(rawType) ? rawType : "1");
            if (!TYPE_ALIAS[rawType] && !["1","2","3","5","6","7","15"].includes(rawType))
              warnings.push(`Fila ${li + 2}: tipo '${cols[idx.tipo]}' desconocido, asignado String.`);
          }
        }
        if (idx.long >= 0 && cols[idx.long] && length !== "4000") length = cols[idx.long].trim() || length;

        const secName = (idx.seccion >= 0 && cols[idx.seccion]) ? cols[idx.seccion].trim().toUpperCase() : "DATOS GENERALES";
        const catName = (idx.categoria >= 0 && cols[idx.categoria]) ? cols[idx.categoria].trim() : "__default__";

        if (!catMap[catName]) { catMap[catName] = {}; catOrder.push(catName); }
        if (!catMap[catName][secName]) catMap[catName][secName] = [];
        catMap[catName][secName].push({ name: nombre, colname, typeno, length });
      });

      if (catOrder.length === 0) return { error: "No se procesó ningún campo válido." };

      const categoryGroups = catOrder.map(catName => ({
        catName: catName === "__default__" ? null : catName,
        sections: Object.entries(catMap[catName]).map(([name, fields]) => ({ name, fields })),
      }));

      return { categoryGroups, warnings, isMulti };
    }

    // ── THEREFORE XML PARSER ──────────────────────────────────────────────────
    // Parses a Therefore Configuration XML export and returns the same shape
    // as parseCsv: { categoryGroups, warnings, isMulti }
    function parseThereforeXml(xmlText) {
      let doc;
      try {
        doc = new DOMParser().parseFromString(xmlText, "application/xml");
      } catch(e) {
        return { error: "No se pudo parsear el XML: " + e.message };
      }
      const parseErr = doc.querySelector("parsererror");
      if (parseErr) return { error: "XML inválido: " + parseErr.textContent.slice(0,120) };

      const catNodes = doc.querySelectorAll("Configuration > Categories > Category");
      if (!catNodes.length) return { error: "No se encontraron categorías en el XML." };

      const VALID_TYPES = new Set(["1","2","3","5","6","7","9","15"]);
      const warnings = [];
      const categoryGroups = [];

      catNodes.forEach(catNode => {
        // Category name: last <T><S> inside <Name>
        let catName = "";
        const nameS = catNode.querySelectorAll(":scope > Name TStr T S");
        if (nameS.length) catName = nameS[nameS.length - 1].textContent.trim();
        if (!catName) return;

        const fieldNodes = catNode.querySelectorAll(":scope > Fields > Field");
        let sections = [];
        let currentSection = null;

        fieldNodes.forEach(field => {
          const typeNo      = field.querySelector(":scope > TypeNo")?.textContent.trim() || "";
          const colName     = field.querySelector(":scope > ColName")?.textContent.trim() || "";
          const hasTable    = !!field.querySelector(":scope > BelongsToTable");
          const hasLinked   = !!field.querySelector(":scope > BelongsTo");

          // Section header: TypeNo 4, no ColName, has <BClr> in DisplayProp
          if (typeNo === "4" && !colName) {
            const hasBClr = !!field.querySelector(":scope > DisplayProp > BClr");
            if (hasBClr) {
              const capS = field.querySelectorAll(":scope > Caption TStr T S");
              let secName = capS.length ? capS[capS.length-1].textContent.trim().toUpperCase() : "";
              if (!secName) secName = field.querySelector(":scope > Caption")?.textContent.trim().toUpperCase() || "SECCIÓN";
              currentSection = { name: secName, fields: [] };
              sections.push(currentSection);
            }
            return;
          }

          // Skip layout, table columns, linked display fields
          if (typeNo === "4" || hasTable || hasLinked) return;

          // Skip unsupported / negative TypeNos
          if (!VALID_TYPES.has(typeNo)) return;

          // Data field must have ColName
          if (!colName) return;

          // Caption: last <T><S> inside <Caption>
          let caption = "";
          const capS = field.querySelectorAll(":scope > Caption TStr T S");
          if (capS.length) caption = capS[capS.length-1].textContent.trim();
          if (!caption) caption = field.querySelector(":scope > Caption")?.textContent.trim() || colName;

          const mappedType = typeNo === "9" ? "1" : typeNo;
          let length = "100";
          const lenEl = field.querySelector(":scope > Length");
          if (lenEl) length = lenEl.textContent.trim() || "100";
          if (mappedType === "5") length = "18";

          if (!currentSection) {
            currentSection = { name: "DATOS IMPORTADOS", fields: [] };
            sections.push(currentSection);
          }
          currentSection.fields.push({ name: caption, colname: colName.toUpperCase().slice(0,30), typeno: mappedType, length });
        });

        sections = sections.filter(s => s.fields.length > 0);
        if (!sections.length) {
          warnings.push(`Categoría "${catName}" sin campos de datos, ignorada.`);
          return;
        }
        categoryGroups.push({ catName, sections });
      });

      if (!categoryGroups.length) return { error: "No se encontró ninguna categoría con campos de datos válidos." };
      return { categoryGroups, warnings, isMulti: true };
    }

    // ── LAYOUT CONSTANTS ──────────────────────────────────────────────────────
    const DIALOG_W  = 530;
    const LBL_X1    = 5,  LBL_W  = 95;
    const FLD_X1    = 102, FLD_W  = 160;
    const LBL_X2    = 270;
    const FLD_X2    = 368, FLD_W2 = 152;
    const ROW_H     = 14,  LBL_H  = 12;
    const ROW_GAP   = 18,  SEC_H  = 13, SEC_GAP = 16;
    const HDR_H     = 42;
    const TAB_PAD_X = 5,   TAB_PAD_Y = 44, TAB_MARGIN = 10;

    // ── XML HELPERS ───────────────────────────────────────────────────────────
    const xmlCaption  = t => `<Caption UPT="1"><TStr><T><L>1034</L><S>${t}</S></T></TStr></Caption>`;
    const xmlRegEx    = () => `<RegExHelp UPT="1"><TStr></TStr></RegExHelp>`;

    function makeDataField({ fieldno, colname, fieldid, caption, typeno, length, width, height, posx, posy, taborder, disporder, displayprop="", tabMeta="" }) {
      const lengthTag = typeno === "5" ? "<Length>18</Length>"
        : (typeno !== "3" && typeno !== "6" && typeno !== "7" && typeno !== "15" && length)
        ? `<Length>${length}</Length>` : "";
      const dp = displayprop || `<BClr>${bgr(255,255,255)}</BClr>`;
      return `<Field><FieldNo>${fieldno}</FieldNo><ColName>${colname}</ColName>${xmlCaption(caption)}<TypeNo>${typeno}</TypeNo>${lengthTag}<Width>${width}</Width><Height>${height}</Height><PosX>${posx}</PosX><PosY>${posy}</PosY><TabOrderPos>${taborder}</TabOrderPos><DontLoadValues>1</DontLoadValues><DispOrderPos>${disporder}</DispOrderPos>${xmlRegEx()}<Links></Links><Id>${newGuid()}</Id><DisplayProp>${dp}</DisplayProp><TabInfo FactoryType="0"></TabInfo><FieldID>${fieldid}</FieldID><DisplayPropCond></DisplayPropCond><Filter></Filter>${tabMeta}</Field>`;
    }

    function makeLabelField({ fieldno, fieldid, caption, width, height, posx, posy, face="Arial", fsize=9, bold=false, tclr=null, bclr=null, al=null, pd=null, tabMeta="" }) {
      let dp = `<Face>${face}</Face><FSize>${fsize}</FSize>`;
      if (bold)       dp += `<Bol>1</Bol>`;
      if (tclr!==null) dp += `<TClr>${tclr}</TClr>`;
      if (bclr!==null) dp += `<BClr>${bclr}</BClr>`;
      if (al!==null)   dp += `<Al>${al}</Al>`;
      if (pd!==null)   dp += `<Pd>${pd}</Pd>`;
      return `<Field><FieldNo>${fieldno}</FieldNo>${xmlCaption(caption)}<TypeNo>4</TypeNo><Width>${width}</Width><Height>${height}</Height><PosX>${posx}</PosX><PosY>${posy}</PosY><DontLoadValues>1</DontLoadValues>${xmlRegEx()}<Links></Links><Id>${newGuid()}</Id><DisplayProp>${dp}</DisplayProp><TabInfo FactoryType="0"></TabInfo><FieldID>${fieldid}</FieldID><DisplayPropCond></DisplayPropCond><Filter></Filter><FullTextSearch>0</FullTextSearch>${tabMeta}</Field>`;
    }

    function tabMetaXml(tabNo, belongsTo) {
      return `<BelongsToTable>${belongsTo}</BelongsToTable><ParentFieldType>3</ParentFieldType><ShowInTabNo>${tabNo}</ShowInTabNo>`;
    }

    // ── CATEGORY XML BUILDER ──────────────────────────────────────────────────
    // Returns just the <Category>...</Category> block
    function buildCategoryBlock({ name, tableName, ctgryId, sections, hasTabs, tab1Name, tab2Name, tableColumns, palette }, ctgryNo = -1) {
      const pal = palette || PALETTES["Therefore Azul"];
      const TAB_NO = -200, TABLE_NO = -201;
      let colNo = -202, fieldNo = -1, labelNo = -50;
      let fieldsXml = "", dispOrder = 1, tabOrder = 1;
      const withTab = hasTabs;
      const tm = n => withTab ? tabMetaXml(n, TAB_NO) : "";

      // Table column fields (tab 2)
      let tableColFields = "";
      if (withTab) {
        let tcd = 1;
        tableColumns.forEach(col => {
          if (!col.name.trim()) return;
          const lt = col.typeno==="5" ? "<Length>18</Length>" : (col.typeno!=="3"&&col.typeno!=="6"&&col.typeno!=="7") ? `<Length>${col.length||50}</Length>` : "";
          tableColFields += `<Field><FieldNo>${colNo}</FieldNo><ColName>${col.colname}</ColName>${xmlCaption(col.name)}<TypeNo>${col.typeno}</TypeNo>${lt}<Width>${col.width||150}</Width><Height>0</Height><PosX>0</PosX><PosY>0</PosY><DontLoadValues>1</DontLoadValues><DispOrderPos>${tcd++}</DispOrderPos>${xmlRegEx()}<Links></Links><BelongsToTable>${TABLE_NO}</BelongsToTable><Id>${newGuid()}</Id><DisplayProp></DisplayProp><ParentFieldType>2</ParentFieldType><TabInfo FactoryType="0"></TabInfo><FieldID>${col.colname}</FieldID><DisplayPropCond></DisplayPropCond><Filter></Filter></Field>`;
          colNo--;
        });
      }

      // Data fields
      let yPos = withTab ? 8 : HDR_H + SEC_GAP;
      const sectionWidth = withTab ? DIALOG_W - TAB_MARGIN*2 - 20 : DIALOG_W - 10;

      sections.forEach((sec, si) => {
        fieldsXml += makeLabelField({ fieldno:labelNo--, fieldid:`Sec_${si}_${tableName}`, caption:sec.name, width:sectionWidth, height:SEC_H, posx:5, posy:yPos, bold:true, tclr:pal.secText, bclr:pal.secBg, al:4, pd:6, tabMeta:tm(1) });
        yPos += SEC_GAP;
        for (let i = 0; i < sec.fields.length; i += 2) {
          const f1 = sec.fields[i], f2 = sec.fields[i+1];
          if (f1) {
            fieldsXml += makeLabelField({ fieldno:labelNo--, fieldid:`Lbl_${f1.colname}`, caption:f1.name, width:LBL_W, height:LBL_H, posx:withTab?LBL_X1+5:LBL_X1, posy:yPos+1, fsize:8, al:4, tclr:pal.labelColor, tabMeta:tm(1) });
            fieldsXml += makeDataField({ fieldno:fieldNo, colname:f1.colname, fieldid:f1.colname, caption:f1.name, typeno:f1.typeno, length:f1.length, width:FLD_W, height:ROW_H, posx:withTab?FLD_X1+5:FLD_X1, posy:yPos, taborder:tabOrder++, disporder:dispOrder++, displayprop:`<TClr>${pal.fieldText}</TClr><BClr>${pal.fieldBg}</BClr>`, tabMeta:tm(1) });
            fieldNo--;
          }
          if (f2) {
            fieldsXml += makeLabelField({ fieldno:labelNo--, fieldid:`Lbl_${f2.colname}`, caption:f2.name, width:LBL_W, height:LBL_H, posx:withTab?LBL_X2+5:LBL_X2, posy:yPos+1, fsize:8, al:4, tclr:pal.labelColor, tabMeta:tm(1) });
            fieldsXml += makeDataField({ fieldno:fieldNo, colname:f2.colname, fieldid:f2.colname, caption:f2.name, typeno:f2.typeno, length:f2.length, width:FLD_W2, height:ROW_H, posx:withTab?FLD_X2+5:FLD_X2, posy:yPos, taborder:tabOrder++, disporder:dispOrder++, displayprop:`<TClr>${pal.fieldText}</TClr><BClr>${pal.fieldBg}</BClr>`, tabMeta:tm(1) });
            fieldNo--;
          }
          yPos += ROW_GAP;
        }
        yPos += 6;
      });

      const contentH = yPos + 10;

      // Flat header (no tabs)
      let headerXml = "";
      if (!withTab) {
        headerXml += makeLabelField({ fieldno:labelNo--, fieldid:`Hdr_Title_${tableName}`, caption:name, width:DIALOG_W-10, height:18, posx:5, posy:6, fsize:14, bold:true, tclr:pal.hdrText, bclr:pal.hdrBg, al:4, pd:5 });
        headerXml += makeLabelField({ fieldno:labelNo--, fieldid:`Hdr_Sub_${tableName}`, caption:tableName, width:DIALOG_W-10, height:12, posx:5, posy:26, fsize:9, tclr:pal.hdrSub, bclr:pal.hdrBg, al:4, pd:5 });
      }

      // Tab + Table controls
      let tabXml = "";
      if (withTab) {
        const camel = toCamel(tableName);
        const tableW = DIALOG_W - TAB_MARGIN*2 - 10;
        const tableH = Math.max(contentH,240) - 30;
        const tabH2  = Math.max(contentH+20, 260);
        tabXml += `<Field><FieldNo>${TABLE_NO}</FieldNo>${xmlCaption(tab2Name)}<TypeNo>10</TypeNo><Width>${tableW}</Width><Height>${tableH}</Height><PosX>5</PosX><PosY>5</PosY><TabOrderPos>${tabOrder++}</TabOrderPos><DontLoadValues>1</DontLoadValues><DispOrderPos>${dispOrder++}</DispOrderPos>${xmlRegEx()}<Links></Links><BelongsToTable>${TAB_NO}</BelongsToTable><ForeignTable>${foreignTableName(tableName)}</ForeignTable><Id>${newGuid()}</Id><DisplayProp></DisplayProp><ParentFieldType>3</ParentFieldType><TabInfo FactoryType="0"></TabInfo><ShowInTabNo>2</ShowInTabNo><FieldID>Historial_${camel}</FieldID><DisplayPropCond></DisplayPropCond><Filter></Filter></Field>`;
        tabXml += `<Field><FieldNo>${TAB_NO}</FieldNo>${xmlCaption("Datos")}<TypeNo>13</TypeNo><Width>${DIALOG_W-TAB_MARGIN*2}</Width><Height>${tabH2}</Height><PosX>${TAB_PAD_X}</PosX><PosY>${TAB_PAD_Y}</PosY><DontLoadValues>1</DontLoadValues>${xmlRegEx()}<Links></Links><Id>${newGuid()}</Id><DisplayProp><Face>Arial</Face><FSize>8</FSize><BClr>${pal.tabBg}</BClr></DisplayProp><TabInfo FactoryType="1"><Tabs><T FactoryType="1"><TabNo>1</TabNo><TabPos>1</TabPos><TabCapt><TStr><T><L>1034</L><S>${tab1Name}</S></T></TStr></TabCapt></T><T FactoryType="1"><TabNo>2</TabNo><TabPos>2</TabPos><TabCapt><TStr><T><L>1034</L><S>${tab2Name}</S></T></TStr></TabCapt></T></Tabs></TabInfo><FieldID>Tab_${camel}</FieldID><DisplayPropCond></DisplayPropCond><Filter></Filter></Field>`;
      }

      const dialogH = withTab ? TAB_PAD_Y + Math.max(contentH+20,260) + 10 : HDR_H + contentH + 10;
      const allFields = sections.flatMap(s=>s.fields).filter(f=>f.name.trim());
      const titleFlds = [-1,-2,-3].slice(0, Math.min(3, allFields.length)).map(n=>`<Fld>${n}</Fld>`).join("");
      const docTitles = `<DocTitles><DocTitlesArr><DocTitle><TitleType>1</TitleType><FieldNos>${titleFlds}</FieldNos><MaxLength>100</MaxLength><HideCtgryName>0</HideCtgryName><ShowFieldNames>0</ShowFieldNames></DocTitle><DocTitle><TitleType>2</TitleType><FieldNos>${titleFlds}</FieldNos><MaxLength>0</MaxLength><HideCtgryName>0</HideCtgryName><ShowFieldNames>1</ShowFieldNames></DocTitle></DocTitlesArr></DocTitles>`;

      return `<Category><CtgryNo>${ctgryNo}</CtgryNo><TableName>${tableName}</TableName><Name UPT="1"><TStr><T><L>1034</L><S>${name}</S></T></TStr></Name><Version>0</Version><Fields>${tableColFields}${fieldsXml}${headerXml}${tabXml}</Fields><DataTypes></DataTypes><Title>${name}</Title><Width>${DIALOG_W}</Width><Height>${dialogH}</Height><Watermark><DocNo>0</DocNo></Watermark><FulltextMode>1</FulltextMode><FulltextDate>18991230</FulltextDate><CheckInMode>1</CheckInMode><Description UPT="1"><TStr></TStr></Description><Header><Font></Font></Header><DlgBgColor>${pal.dlgBg}</DlgBgColor><EmptyDocMode>1</EmptyDocMode><CoverMode>1</CoverMode>${docTitles}<CtgryID>${ctgryId}</CtgryID></Category>`;
    }

    // ── EFORM GENERATION (combined export) ───────────────────────────────────
    function dcreaNow() {
      const d = new Date(), p = (n,l=2)=>String(n).padStart(l,"0");
      return `${d.getFullYear()}${p(d.getMonth()+1)}${p(d.getDate())}${p(d.getHours())}${p(d.getMinutes())}${p(d.getSeconds())}000`;
    }
    const EF_COND  = { show:"", when:"", json:"" };
    const EF_EXTRA = { reorder:false, properties:{}, customConditional:"", logic:[], attributes:{}, conditional:EF_COND };
    const efVal    = (required, extra={}) => ({ required, customMessage:"", json:"", ...extra });

    function colToCamel(col) {
      return (col||"campo").toLowerCase().split("_")
        .map((w,i) => i===0 ? w : w.charAt(0).toUpperCase()+w.slice(1)).join("") || "campo";
    }

    function buildEfComp(f) {
      const key = colToCamel(f.colname);
      switch(f.typeno) {
        case "3": return { label:f.name, tableView:true, alwaysEnabled:false, type:"datetime", input:true, key,
          enableDate:true, enableTime:false, format:"dd/MM/yyyy", ...EF_EXTRA, validate:efVal(false) };
        case "7": return { label:f.name, tableView:true, alwaysEnabled:false, type:"datetime", input:true, key,
          enableDate:true, enableTime:true, format:"dd/MM/yyyy HH:mm", ...EF_EXTRA, validate:efVal(false) };
        case "2": return { label:f.name, tableView:true, alwaysEnabled:false, type:"number", input:true, key,
          ...EF_EXTRA, validate:efVal(false) };
        case "5": return { label:f.name, tableView:true, alwaysEnabled:false, type:"currency", input:true, key,
          currency:"EUR", ...EF_EXTRA, validate:efVal(false) };
        case "6": return { label:f.name, tableView:true, alwaysEnabled:false, type:"checkbox", input:true, key,
          ...EF_EXTRA, validate:efVal(false) };
        case "15": return { label:f.name, tableView:true, alwaysEnabled:false, type:"select", input:true, key,
          data:{ values:[] }, ...EF_EXTRA, validate:efVal(false) };
        default:  return { label:f.name, allowMultipleMasks:false, showWordCount:false, showCharCount:false,
          tableView:true, alwaysEnabled:false, type:"textfield", input:true, key,
          inputFormat:"plain", encrypted:false, ...EF_EXTRA,
          validate:efVal(false, { maxLength: parseInt(f.length)||500 }) };
      }
    }

    function buildEfFormioJson({ sections, colsPerRow, submitLabel }) {
      const cols = colsPerRow||2, width = Math.floor(12/cols);
      const components = [];
      let colIdx = 1;

      sections.forEach((sec, si) => {
        const valid = sec.fields.filter(f => f.name.trim() && f.colname.trim());
        if (!valid.length) return;
        const panelComps = [];
        let i = 0;
        while (i < valid.length) {
          if (valid[i].typeno === "6") {          // checkbox → directo en panel
            panelComps.push(buildEfComp(valid[i++]));
          } else {
            const row = [];
            while (i < valid.length && valid[i].typeno !== "6" && row.length < cols)
              row.push(valid[i++]);
            panelComps.push({
              label:"Columnas", type:"columns",
              key:`cols_${si}_${Math.floor((i-row.length)/cols)}`,
              input:false, tableView:false, mask:false,
              alwaysEnabled:false, reorder:false,
              properties:{}, customConditional:"", logic:[], attributes:{}, conditional:EF_COND,
              columns: row.map(rf => ({
                width, offset:0, push:0, pull:0,
                type:"column", input:false, hideOnChildrenHidden:false,
                key:`column${colIdx++}`, tableView:true, label:"Column",
                components:[buildEfComp(rf)]
              }))
            });
          }
        }
        const panelKey = sec.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")
          .replace(/[^a-z0-9]+/g,"_").replace(/^_|_$/g,"") || `sec${si}`;
        components.push({
          label:sec.name, type:"panel", key:`panel_${panelKey}`,
          input:false, tableView:false, collapsible:false,
          reorder:false, properties:{}, customConditional:"",
          logic:[], attributes:{}, conditional:EF_COND,
          components:panelComps
        });
      });

      components.push({ type:"button", label:submitLabel||"Enviar", key:"submit",
        theme:"primary", input:true, tableView:true });
      return { display:"form", settings:{}, components };
    }

    function buildEFormBlock({ name, eformName, eformSubmitLabel, eformColsPerRow, sections }) {
      const formio = buildEfFormioJson({ sections, colsPerRow:eformColsPerRow||2, submitLabel:eformSubmitLabel||"Enviar" });
      const fName  = (eformName||name).trim();
      const formID = fName.replace(/\s+/g,"").replace(/[^A-Za-z0-9]/g,"") || "EForm";
      return `<EForm><FNo>-1</FNo><FVer>1</FVer><FName>${fName}</FName><FDef>${JSON.stringify(formio,null,2)}</FDef><DCrea>${dcreaNow()}</DCrea><FCreUs>10</FCreUs><FCreUsNam>admin</FCreUsNam><Id>${newGuid()}</Id><FormID>${formID}</FormID></EForm>`;
    }

    // Wraps one or more category blocks in the full Therefore Configuration envelope
    // Si alguna categoría tiene withEForm=true, genera también el bloque EForms.
    function buildProjectXml(categoryDefs) {
      const blocks     = categoryDefs.map((def, i) => buildCategoryBlock(def, -(i + 1))).join("");
      const eformBlocks = categoryDefs.filter(d => d.withEForm).map(d => buildEFormBlock(d)).join("");
      return `<Configuration><Version>570425345</Version><NewImportExport>1</NewImportExport><Categories>${blocks}</Categories><QueryTemplates></QueryTemplates><CaseDefinitions></CaseDefinitions><Folders></Folders><Datatypes></Datatypes><KeywordDictionaries></KeywordDictionaries><Counters></Counters><Templates></Templates><WFProcesses></WFProcesses><UCProfiles></UCProfiles><TreeViews></TreeViews><CloudStorages></CloudStorages><Preprocessors></Preprocessors><Forms></Forms><FormImgs></FormImgs><ReportDefinitions></ReportDefinitions><ReportTemplates></ReportTemplates><PowerBIDataSets></PowerBIDataSets><PowerBITables></PowerBITables><EForms>${eformBlocks}</EForms><ESignatureProviders></ESignatureProviders><Roles></Roles><RoleAssignments></RoleAssignments><CommonScripts></CommonScripts><OfficeProfiles></OfficeProfiles><IxProfiles></IxProfiles><Queries></Queries><Users></Users><CaptProfiles></CaptProfiles><References></References><CntConnSrcs></CntConnSrcs><Dashboards></Dashboards><Stamps></Stamps><RetentionPolicies></RetentionPolicies><SmartCaptureProcessors></SmartCaptureProcessors><SmartCaptureQueues></SmartCaptureQueues><DocDownloadProviders></DocDownloadProviders><Credentials></Credentials></Configuration>`;
    }

    // ── XML IMPORTER ──────────────────────────────────────────────────────────

      const [open, setOpen]       = useState(false);

      const [loading, setLoading] = useState(false);

      const handleFile = e => {
        const file = e.target.files[0];
        if (!file) return;
        setFileName(file.name);
        setPreview(null);
        setLoading(true);
        const reader = new FileReader();
        reader.onload = ev => { setLoading(false); setPreview(parseThereforeXml(ev.target.result)); };
        reader.onerror = () => { setLoading(false); setPreview({ error: "Error leyendo el archivo." }); };
        reader.readAsText(file, "utf-8");
        e.target.value = "";
      };

      const handleApply = mode => {
        if (!preview || preview.error) return;
        onImport(preview, mode);
        setPreview(null); setFileName(""); setOpen(false);
      };

      const totalFields = preview && !preview.error
        ? preview.categoryGroups.reduce((a,g)=>a+g.sections.reduce((b,s)=>b+s.fields.length,0),0) : 0;

      return (
        <div style={{marginBottom:"16px"}}>

    // ── CATEGORY FACTORY ──────────────────────────────────────────────────────
    function makeNewCategory(overrides={}) {
      return {
        id: newGuid(),
        catName: "", tableName: "",
        hasTabs: false, tab1Name: "Datos", tab2Name: "Historial",
        sections: [{ name: "DATOS GENERALES", fields: [{ name:"", colname:"", typeno:"1", length:"100" }] }],
        tableColumns: [
          { name:"Columna 1", colname:"COL1", typeno:"1", length:"50", width:"150" },
          { name:"Columna 2", colname:"COL2", typeno:"1", length:"50", width:"150" },
          { name:"Columna 3", colname:"COL3", typeno:"1", length:"100", width:"200" },
        ],
        // eForm vinculado
        withEForm: false, eformName: "", eformSubmitLabel: "Enviar", eformColsPerRow: 2,
        ...overrides,
      };
    }

    // ── MAIN APP ──────────────────────────────────────────────────────────────
    function App() {
      const firstCat = makeNewCategory();
      const [categories, setCategories]   = useState([firstCat]);
      const [activeCatId, setActiveCatId] = useState(firstCat.id);
      const [xml, setXml]                 = useState("");
      const [copied, setCopied]           = useState(false);
      const [error, setError]             = useState("");
      const [activeView, setActiveView]   = useState("editor");
      const [palette, setPalette]         = useState(PALETTES["Corporativa"]);
      const [showColors, setShowColors]   = useState(false);

      const activeCat = categories.find(c => c.id === activeCatId) || categories[0];

      // Update a field on the active category
      const patchActive = patch => setCategories(cats =>
        cats.map(c => c.id === activeCatId ? { ...c, ...patch } : c)
      );

      const ctgryId = activeCat.catName.trim().replace(/\s+/g,"_").replace(/[^A-Za-z0-9_]/g,"");
      const tblName = activeCat.tableName.trim().replace(/\s+/g,"_").replace(/[^A-Za-z0-9_]/g,"").toUpperCase();

      // ── Section / Field ops ───────────────────────────────────────────────
      const newField   = () => ({ name:"", colname:"", typeno:"1", length:"100" });
      const addSection = () => patchActive({ sections:[...activeCat.sections,{name:"NUEVA SECCION",fields:[newField()]}] });
      const removeSection = i => patchActive({ sections:activeCat.sections.filter((_,idx)=>idx!==i) });
      const updateSecName = (i,v) => patchActive({ sections:activeCat.sections.map((s,idx)=>idx===i?{...s,name:v.toUpperCase()}:s) });
      const addField      = si => patchActive({ sections:activeCat.sections.map((s,idx)=>idx===si?{...s,fields:[...s.fields,newField()]}:s) });
      const removeField   = (si,fi) => patchActive({ sections:activeCat.sections.map((s,idx)=>idx===si?{...s,fields:s.fields.filter((_,fIdx)=>fIdx!==fi)}:s) });
      const updateField   = (si,fi,val) => patchActive({ sections:activeCat.sections.map((s,idx)=>idx===si?{...s,fields:s.fields.map((f,fIdx)=>fIdx===fi?val:f)}:s) });

      const addCol    = () => patchActive({ tableColumns:[...activeCat.tableColumns,{name:"",colname:"",typeno:"1",length:"50",width:"150"}] });
      const removeCol = i  => patchActive({ tableColumns:activeCat.tableColumns.filter((_,idx)=>idx!==i) });
      const updateCol = (i,val) => patchActive({ tableColumns:activeCat.tableColumns.map((c,idx)=>idx===i?val:c) });

      // ── Category ops ─────────────────────────────────────────────────────
      const addCategory = () => {
        const nc = makeNewCategory();
        setCategories(cats => [...cats, nc]);
        setActiveCatId(nc.id);
        setXml(""); setError("");
      };

      const removeCategory = id => {
        if (categories.length <= 1) return;
        const remaining = categories.filter(c => c.id !== id);
        setCategories(remaining);
        if (activeCatId === id) setActiveCatId(remaining[0].id);
        setXml("");
      };

      // ── Template load ─────────────────────────────────────────────────────
      const handleTemplateLoad = (parseResult) => {
        handleCsvImport(parseResult, "replace");
        setXml(""); setError("");
      };

      // ── CSV Import ────────────────────────────────────────────────────────
      const handleCsvImport = (parseResult, mode) => {
        const { categoryGroups, isMulti } = parseResult;

        if (isMulti) {
          const newCats = categoryGroups.map(({ catName, sections }) =>
            makeNewCategory({ catName: catName || "", sections })
          );
          if (mode === "replace") {
            setCategories(newCats);
            setActiveCatId(newCats[0].id);
          } else {
            setCategories(prev => {
              const merged = [...prev, ...newCats];
              return merged;
            });
            setActiveCatId(newCats[0].id);
          }
        } else {
          // Single group → update active category's sections
          const { sections: newSections } = categoryGroups[0];
          if (mode === "replace") {
            patchActive({ sections: newSections });
          } else {
            const merged = [...activeCat.sections];
            newSections.forEach(ns => {
              const existing = merged.find(s => s.name === ns.name);
              if (existing) existing.fields = [...existing.fields, ...ns.fields];
              else merged.push(ns);
            });
            patchActive({ sections: merged });
          }
        }
        setXml("");
      };

      // ── Generate ──────────────────────────────────────────────────────────
      const generate = () => {
        setError("");
        const validCats = categories.filter(c => {
          const fields = c.sections.flatMap(s=>s.fields).filter(f=>f.name.trim());
          return c.catName.trim() && fields.length > 0;
        });
        if (validCats.length === 0) {
          setError("Añade al menos una categoría con nombre y campos.");
          return;
        }
        const defs = validCats.map(c => {
          const rand = Math.random().toString(36).substring(2,7).toUpperCase();
          const tbl  = c.tableName.trim().replace(/\s+/g,"_").replace(/[^A-Za-z0-9_]/g,"").toUpperCase() || ("TMP_"+rand);
          const cid  = c.catName.trim().replace(/\s+/g,"_").replace(/[^A-Za-z0-9_]/g,"");
          const secs = c.sections.map(s=>({...s,fields:s.fields.filter(f=>f.name.trim())})).filter(s=>s.fields.length>0);
          return {
            name: c.catName.trim(), tableName: tbl, ctgryId: cid,
            sections: secs,
            hasTabs: c.hasTabs, tab1Name: c.tab1Name, tab2Name: c.tab2Name,
            tableColumns: c.tableColumns, palette,
            // eForm
            withEForm: c.withEForm,
            eformName: c.eformName || c.catName.trim(),
            eformSubmitLabel: c.eformSubmitLabel || "Enviar",
            eformColsPerRow: c.eformColsPerRow || 2,
          };
        });
        setXml(buildProjectXml(defs));
      };

      const copy = () => {
        const fallback = () => { const ta=document.createElement("textarea"); ta.value=xml; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); setCopied(true); setTimeout(()=>setCopied(false),2000); };
        if (navigator.clipboard?.writeText) navigator.clipboard.writeText(xml).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2000);}).catch(fallback);
        else fallback();
      };

      const download = () => {
        const a = document.createElement("a");
        a.href = "data:application/xml;charset=utf-8," + encodeURIComponent(xml);
        a.download = (categories.length>1?"proyecto":tblName||"categoria") + "_therefore.xml";
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      };

      return (
        <div style={S.wrap}>
          {/* HEADER */}
          <div style={{...S.header,display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div>
              <h1 style={S.title}>⚙ Therefore Category Builder</h1>
            </div>
            <div style={{display:"flex",gap:"8px"}}>
              {["editor","preview"].map(v=>(
                <button key={v} onClick={()=>setActiveView(v)} style={{...S.btn,borderColor:activeView===v?"#9ad1ff":"rgba(255,255,255,.14)",background:activeView===v?"rgba(154,209,255,.15)":"rgba(255,255,255,.06)",color:activeView===v?"#9ad1ff":"#e6e7eb"}}>
                  {v==="editor"?"✎ Editor":"👁 Preview"}
                </button>
              ))}
            </div>
          </div>

          {/* PLANTILLAS SUPABASE */}
          <TemplateManager
            onLoad={handleTemplateLoad}
            categoriesToSave={categories}
            activeCatName={activeCat.catName}
          />

          {/* CATEGORY TABS */}
          <div style={{marginBottom:"16px"}}>
            <div style={{display:"flex",gap:"6px",flexWrap:"wrap",alignItems:"center"}}>
              {categories.map((cat,ci)=>(
                <div key={cat.id} style={{display:"flex",alignItems:"center",gap:0}}>
                  <button onClick={()=>setActiveCatId(cat.id)} style={{
                    background: activeCatId===cat.id ? "rgba(154,209,255,.15)" : "rgba(255,255,255,.04)",
                    border: `1px solid ${activeCatId===cat.id?"#9ad1ff":"rgba(255,255,255,.12)"}`,
                    borderRight: "none",
                    borderRadius:"8px 0 0 8px",
                    color: activeCatId===cat.id?"#9ad1ff":"rgba(238,244,255,.7)",
                    fontSize:"12px", padding:"6px 12px", cursor:"pointer", fontWeight:activeCatId===cat.id?600:400,
                  }}>
                    {cat.catName||`Categoría ${ci+1}`}
                  </button>
                  {categories.length>1&&(
                    <button onClick={()=>removeCategory(cat.id)} title="Eliminar categoría" style={{
                      background: activeCatId===cat.id?"rgba(154,209,255,.15)":"rgba(255,255,255,.04)",
                      border:`1px solid ${activeCatId===cat.id?"#9ad1ff":"rgba(255,255,255,.12)"}`,
                      borderRadius:"0 8px 8px 0",
                      color:"rgba(254,202,202,.6)", fontSize:"11px", padding:"6px 8px", cursor:"pointer",
                    }}>✕</button>
                  )}
                </div>
              ))}
              <button onClick={addCategory} style={{...S.btn,borderStyle:"dashed",color:"rgba(154,209,255,.7)"}}>+ Categoría</button>
            </div>
            <div style={{fontSize:"11px",color:"rgba(238,244,255,.30)",marginTop:"6px"}}>
              {categories.length} categoría(s) · El XML final incluirá todas
            </div>
          </div>

          {/* IDENTITY */}
          <div style={{...S.panel,marginBottom:"16px"}}>
            <div style={S.panelTitle}>Identidad — {activeCat.catName||"sin nombre"}</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:"12px"}}>
              <div><label style={S.label}>Nombre visible *</label><input style={S.input} value={activeCat.catName} onChange={e=>patchActive({catName:e.target.value})} placeholder="ej. Contratos Proveedor"/></div>
              <div><label style={S.label}>TableName (BD) <span style={{color:"rgba(238,244,255,.35)"}}>(opcional)</span></label><input style={S.input} value={activeCat.tableName} onChange={e=>patchActive({tableName:e.target.value.toUpperCase()})} placeholder="Se genera automáticamente"/></div>
              <div><label style={S.label}>CtgryID (auto)</label><input style={{...S.input,color:"rgba(238,244,255,.40)"}} value={ctgryId} readOnly/></div>
            </div>
          </div>

          {/* COLORES */}
          <div style={{...S.panel,marginBottom:"16px"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:showColors?"14px":0}}>
              <span style={S.panelTitle}>🎨 Paleta de colores <span style={{color:"rgba(238,244,255,.35)",fontWeight:400}}>(global)</span></span>
              <button style={S.btn} onClick={()=>setShowColors(v=>!v)}>{showColors?"▲ Ocultar":"▼ Mostrar"}</button>
            </div>
            {showColors&&<ColorEditor palette={palette} onChange={setPalette}/>}
          </div>

          {activeView==="preview" ? (
            <div style={S.panel}>
              <div style={S.panelTitle}>Preview — {activeCat.catName||"sin nombre"}</div>
              <DialogPreview catName={activeCat.catName} tableName={tblName} sections={activeCat.sections} hasTabs={activeCat.hasTabs} tab1Name={activeCat.tab1Name} tab2Name={activeCat.tab2Name} palette={palette}/>
            </div>
          ) : (
            <div style={S.grid}>
              {/* LEFT */}
              <div>
                <CsvImporter onImport={handleCsvImport}/>
                <XmlImporter onImport={handleCsvImport}/>
                <div style={{...S.panel,marginBottom:0}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                    <span style={S.panelTitle}>Secciones y campos</span>
                    <button style={S.btn} onClick={addSection}>+ Sección</button>
                  </div>
                  {activeCat.sections.map((sec,si)=>(
                    <div key={si} style={S.sec}>
                      <div style={S.secHeader}>
                        <input style={{...S.input,fontWeight:600,color:"#9ad1ff",width:"auto",flex:1,marginRight:"8px"}} value={sec.name} onChange={e=>updateSecName(si,e.target.value)} placeholder="NOMBRE SECCION"/>
                        <span style={{...S.badge,marginRight:"8px"}}>{sec.fields.filter(f=>f.name).length} campos</span>
                        {activeCat.sections.length>1&&<button style={S.btnDanger} onClick={()=>removeSection(si)}>✕ Sección</button>}
                      </div>
                      {sec.fields.map((f,fi)=>(
                        <FieldRow key={fi} field={f} onChange={v=>updateField(si,fi,v)} onRemove={()=>removeField(si,fi)}/>
                      ))}
                      <button style={{...S.btn,marginTop:"6px"}} onClick={()=>addField(si)}>+ Campo</button>
                    </div>
                  ))}
                </div>
              </div>

              {/* RIGHT */}
              <div style={{display:"flex",flexDirection:"column",gap:"16px"}}>
                {/* Pestañas */}
                <div style={S.panel}>
                  <div style={S.panelTitle}>Pestañas</div>
                  <label style={S.toggle(activeCat.hasTabs)} onClick={()=>patchActive({hasTabs:!activeCat.hasTabs})}>
                    <span style={{width:"32px",height:"18px",borderRadius:"9px",background:activeCat.hasTabs?"#9ad1ff":"rgba(255,255,255,.10)",border:"1px solid rgba(255,255,255,.18)",display:"inline-block",position:"relative"}}>
                      <span style={{position:"absolute",top:"2px",left:activeCat.hasTabs?"14px":"2px",width:"12px",height:"12px",borderRadius:"50%",background:activeCat.hasTabs?"#000":"rgba(238,244,255,.45)",transition:"left 0.15s"}}/>
                    </span>
                    {activeCat.hasTabs?"Pestañas activadas":"Sin pestañas"}
                  </label>
                  {activeCat.hasTabs&&<div style={{marginTop:"12px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                    <div><label style={S.label}>Pestaña 1</label><input style={S.input} value={activeCat.tab1Name} onChange={e=>patchActive({tab1Name:e.target.value})}/></div>
                    <div><label style={S.label}>Pestaña 2</label><input style={S.input} value={activeCat.tab2Name} onChange={e=>patchActive({tab2Name:e.target.value})}/></div>
                  </div>}
                </div>

                {/* eForm vinculado */}
                <div style={{...S.panel,borderColor:activeCat.withEForm?"rgba(167,243,208,.30)":"rgba(255,255,255,.10)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:activeCat.withEForm?"14px":0}}>
                    <span style={S.panelTitle}>📋 eForm vinculado</span>
                    <label style={S.toggle(activeCat.withEForm)} onClick={()=>patchActive({withEForm:!activeCat.withEForm})}>
                      <span style={{width:"32px",height:"18px",borderRadius:"9px",background:activeCat.withEForm?"#a7f3d0":"rgba(255,255,255,.10)",border:"1px solid rgba(255,255,255,.18)",display:"inline-block",position:"relative"}}>
                        <span style={{position:"absolute",top:"2px",left:activeCat.withEForm?"14px":"2px",width:"12px",height:"12px",borderRadius:"50%",background:activeCat.withEForm?"#000":"rgba(238,244,255,.45)",transition:"left 0.15s"}}/>
                      </span>
                      {activeCat.withEForm?"Activado":"Desactivado"}
                    </label>
                  </div>
                  {activeCat.withEForm&&<div style={{display:"grid",gap:"10px"}}>
                    <div style={{fontSize:"11px",color:"rgba(167,243,208,.70)",lineHeight:"1.6",background:"rgba(167,243,208,.06)",border:"1px solid rgba(167,243,208,.15)",borderRadius:"6px",padding:"8px 10px"}}>
                      Se generará un eForm con los mismos campos y secciones que esta categoría. Ambos se incluirán en el mismo XML.
                    </div>
                    <div>
                      <label style={S.label}>Nombre del formulario</label>
                      <input style={S.input} value={activeCat.eformName}
                        onChange={e=>patchActive({eformName:e.target.value})}
                        placeholder={activeCat.catName||"Nombre automático desde la categoría"}/>
                    </div>
                    <div>
                      <label style={S.label}>Texto botón enviar</label>
                      <input style={S.input} value={activeCat.eformSubmitLabel}
                        onChange={e=>patchActive({eformSubmitLabel:e.target.value})}
                        placeholder="Enviar"/>
                    </div>
                    <div>
                      <label style={S.label}>Columnas por fila en el formulario web</label>
                      <div style={{display:"flex",gap:"4px"}}>
                        {[1,2,3,4].map(n=>(
                          <button key={n} onClick={()=>patchActive({eformColsPerRow:n})}
                            style={{...S.btn,padding:"6px 12px",fontSize:"11px",
                              borderColor:activeCat.eformColsPerRow===n?"#a7f3d0":"rgba(255,255,255,.14)",
                              background:activeCat.eformColsPerRow===n?"rgba(167,243,208,.15)":"rgba(255,255,255,.06)",
                              color:activeCat.eformColsPerRow===n?"#a7f3d0":"#e6e7eb"}}>
                            {n}
                          </button>
                        ))}
                      </div>
                    </div>
                  </div>}
                </div>

                {/* Columnas tabla */}
                {activeCat.hasTabs&&<div style={S.panel}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                    <span style={S.panelTitle}>Columnas tabla (pestaña 2)</span>
                    <button style={S.btn} onClick={addCol}>+ Columna</button>
                  </div>
                  {activeCat.tableColumns.map((col,i)=>(
                    <ColRow key={i} col={col} onChange={v=>updateCol(i,v)} onRemove={()=>removeCol(i)}/>
                  ))}
                </div>}

                {/* Generar */}
                <div style={S.panel}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px"}}>
                    <span style={S.panelTitle}>Generar XML del proyecto</span>
                    <span style={{...S.badge}}>{categories.length} categ.</span>
                  </div>
                  {error&&<div style={{color:"#fecaca",fontSize:"12px",marginBottom:"10px",background:"rgba(255,80,80,.12)",border:"1px solid rgba(255,80,80,.25)",padding:"8px 12px",borderRadius:"8px"}}>⚠ {error}</div>}
                  <button style={S.btnPrimary} onClick={generate}>Generar XML →</button>
                  {xml&&<div style={{marginTop:"14px"}}>
                    <div style={{display:"flex",gap:"8px",marginBottom:"8px",flexWrap:"wrap"}}>
                      <button style={S.btnGreen} onClick={copy}>{copied?"✓ Copiado":"📋 Copiar XML"}</button>
                      <button style={S.btn} onClick={download}>⬇ Descargar .xml</button>
                      <button style={S.btn} onClick={()=>{const w=window.open("");w.document.write("<pre style='word-break:break-all;font-size:12px'>"+xml.replace(/</g,"&lt;")+"</pre>");w.document.title="therefore_project.xml";}}>🔗 Nueva pestaña</button>
                    </div>
                    <div style={{fontSize:"11px",color:"rgba(238,244,255,.40)",marginBottom:"6px"}}>{xml.length.toLocaleString()} caracteres · {(xml.match(/<Category>/g)||[]).length} categoría(s){(xml.match(/<EForm>/g)||[]).length>0&&` · ${(xml.match(/<EForm>/g)||[]).length} eForm(s)`}</div>
                    <textarea readOnly style={{...S.input,height:"120px",resize:"vertical",fontFamily:"'Consolas','Cascadia Code',monospace",fontSize:"11px",color:"#a7f3d0"}} value={xml} onClick={e=>e.target.select()}/>
                  </div>}
                </div>
              </div>
            </div>
          )}

          <div style={{marginTop:"16px",fontSize:"11px",color:"rgba(238,244,255,.25)",borderTop:"1px solid rgba(255,255,255,.08)",paddingTop:"12px"}}>
            Therefore Category Builder v7.0 · Aneker · Multi-categoría · Post-import: mover a carpeta SD · añadir ImageFld · convertir TextCounter si necesario
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
