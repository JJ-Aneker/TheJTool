<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil de Usuario · TheJ ToolBox</title>
  <style>
    body {
      margin: 0;
      padding: 1rem;
      background: #2A2D34;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto;
      color: rgba(238,244,255,.95);
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .header h1 {
      margin: 0;
      color: #81A2D1;
      font-size: 1.5rem;
    }
    .buttons {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .action-btn {
      padding: 0.35rem 0.65rem;
      background: transparent;
      border: 1.5px solid #81A2D1;
      border-radius: 5px;
      color: #81A2D1;
      font-size: 0.75rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      line-height: 1.3;
    }
    .action-btn:hover {
      background: #81A2D1;
      color: white;
    }
    .action-btn.danger {
      border-color: #d44;
      color: #d44;
    }
    .action-btn.danger:hover {
      background: #d44;
      color: white;
    }
    .profile-card {
      background: linear-gradient(135deg, rgba(129,162,209,0.1) 0%, rgba(129,162,209,0.05) 100%);
      border: 1px solid rgba(129,162,209,0.2);
      padding: 2rem;
      border-radius: 8px;
      max-width: 500px;
      margin: 0 auto;
    }
    .profile-card-header {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
      align-items: flex-start;
    }
    .profile-card img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #81A2D1;
      flex-shrink: 0;
    }
    .profile-info {
      flex: 1;
      text-align: left;
    }
    .profile-card h3 {
      color: rgba(238,244,255,.95);
      margin: 0 0 0.25rem 0;
      font-size: 1.2rem;
      font-weight: 500;
    }
    .profile-card p {
      color: rgba(238,244,255,.6);
      margin: 0 0 0.2rem 0;
      font-size: 0.8rem;
    }
    .profile-card .role {
      color: #81A2D1;
      margin: 0.5rem 0 0 0;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }
    .profile-actions {
      display: flex;
      gap: 0.5rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }
    .profile-actions button {
      flex: 1;
      min-width: 90px;
      padding: 0.65rem 1.2rem;
      background: linear-gradient(135deg, rgba(129,162,209,0.3) 0%, rgba(129,162,209,0.15) 100%);
      border: 1px solid rgba(129,162,209,0.4);
      border-radius: 12px;
      color: #81A2D1;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .profile-actions button:hover {
      background: linear-gradient(135deg, rgba(129,162,209,0.4) 0%, rgba(129,162,209,0.25) 100%);
      border-color: rgba(129,162,209,0.6);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(129,162,209,0.2);
    }
    .profile-actions button.danger {
      background: linear-gradient(135deg, rgba(212,76,76,0.3) 0%, rgba(212,76,76,0.15) 100%);
      border-color: rgba(212,76,76,0.4);
      color: #d44;
    }
    .profile-actions button.danger:hover {
      background: linear-gradient(135deg, rgba(212,76,76,0.4) 0%, rgba(212,76,76,0.25) 100%);
      border-color: rgba(212,76,76,0.6);
      box-shadow: 0 4px 12px rgba(212,76,76,0.2);
    }
    .glass-modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,.6);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }
    .glass-modal-overlay.active {
      display: flex;
    }
    .glass-modal {
      background: linear-gradient(135deg, rgba(255,255,255,.15), rgba(255,255,255,.08));
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 12px;
      backdrop-filter: blur(10px);
      padding: 0;
      box-shadow: 0 8px 32px rgba(0,0,0,.3);
    }
    .glass-modal-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 20px;
      border-bottom: 1px solid rgba(255,255,255,.1);
    }
    .glass-modal-title {
      font-weight: 600;
      font-size: 16px;
      color: rgba(238,244,255,.95);
    }
    .glass-modal-x {
      background: none;
      border: none;
      color: rgba(238,244,255,.6);
      cursor: pointer;
      font-size: 20px;
      padding: 0;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .glass-modal-x:hover {
      color: rgba(238,244,255,.95);
    }
    .glass-modal-body {
      padding: 20px;
    }
    .glass-modal-field-label {
      font-size: 13px;
      margin-bottom: 4px;
      display: block;
      color: rgba(238,244,255,.8);
    }
    .glass-modal-input {
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 6px;
      color: rgba(238,244,255,.95);
      padding: 8px 12px;
      width: 100%;
      font-family: inherit;
      font-size: 14px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    .glass-modal-input:focus {
      outline: none;
      border-color: #81A2D1;
      background: rgba(255,255,255,.12);
    }
    .glass-modal-input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .glass-modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,.1);
    }
    .ghost-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,.2);
      color: rgba(238,244,255,.8);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }
    .ghost-btn:hover {
      background: rgba(255,255,255,.1);
      border-color: rgba(255,255,255,.3);
    }
    .cta {
      background: #81A2D1;
      border: none;
      color: white;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.2s;
    }
    .cta:hover {
      background: #0056b3;
    }
    #avatar-preview {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 1.5rem;
    }
    .error {
      color: #fecaca;
      font-size: 12px;
      background: rgba(255,80,80,.12);
      border: 1px solid rgba(255,80,80,.25);
      padding: 8px 12px;
      border-radius: 8px;
      display: none;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Perfil de Usuario</h1>
    <div class="buttons">
      <button class="action-btn" onclick="showHelp()">❓ Ayuda</button>
      <button class="action-btn" onclick="openFullWindow()">🔗 Ventana Completa</button>
    </div>
  </div>

  <div id="profileContainer"></div>

  <div id="edit-modal-root"></div>
  <div id="avatar-modal-root"></div>

  <script>
    let currentProfile = null;
    let currentUser = null;

    async function initUser() {
      try {
        const response = await fetch(window.location.origin + '/api/profile', {
          headers: { 'Authorization': 'Bearer ' + (await getAuthToken()) }
        });
        if (!response.ok) {
          const fromWindow = window.__profile;
          if (fromWindow) {
            currentProfile = fromWindow;
            currentUser = { email: window.__user?.email };
            renderProfile();
            return;
          }
          throw new Error('Failed to fetch profile');
        }
        currentProfile = await response.json();
        renderProfile();
      } catch (e) {
        console.error('Error loading profile:', e);
        document.getElementById('profileContainer').innerHTML = '<p style="color: #fca5a5;">Error cargando perfil</p>';
      }
    }

    async function getAuthToken() {
      try {
        if (window.ENV && window.ENV.SUPABASE_URL) {
          const response = await fetch(window.ENV.SUPABASE_URL + '/auth/v1/user', {
            headers: { 'Authorization': 'Bearer ' + localStorage.getItem('sb-auth-token') }
          });
          return localStorage.getItem('sb-auth-token');
        }
      } catch (e) {
        console.warn('No auth token available');
      }
      return '';
    }

    function renderProfile() {
      const roleLabel = { read: "Lector", write: "Editor", admin: "Administrador" }[currentProfile?.role] || currentProfile?.role || "Usuario";
      const html = `
        <div class="profile-card">
          <div class="profile-card-header">
            <img src="${currentProfile?.avatar_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23333%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%22 y=%2250%22 font-size=%2240%22 fill=%22%23999%22 text-anchor=%22middle%22 dy=%22.3em%22%3E👤%3C/text%3E%3C/svg%3E'}" alt="Avatar">
            <div class="profile-info">
              <h3>${escapeHtml(currentProfile?.name || 'Usuario')}</h3>
              <p>${escapeHtml(currentUser?.email || '—')}</p>
              <p class="role">${escapeHtml(roleLabel)}</p>
            </div>
          </div>
          <div class="profile-actions">
            <button onclick="openEditProfileForm()">✏️ Editar</button>
            <button onclick="openAvatarUpload()">🖼️ Foto</button>
            <button class="danger" onclick="logoutUser()">🚪 Salir</button>
          </div>
        </div>
      `;
      document.getElementById('profileContainer').innerHTML = html;
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function openEditModal({ title, fields, onSave }) {
      const root = document.getElementById('edit-modal-root');
      const fieldsHtml = fields.map(f => `
        <div style="margin-bottom:12px">
          <label class="glass-modal-field-label">${escapeHtml(f.label)}${f.required ? ' <span style="color:#fca5a5">*</span>' : ''}</label>
          ${f.type === "textarea"
            ? `<textarea id="frm-${f.id}" class="glass-modal-input" rows="2">${escapeHtml(f.value || "")}</textarea>`
            : `<input id="frm-${f.id}" class="glass-modal-input" type="${f.type || "text"}" value="${escapeHtml(f.value || "")}" placeholder="${escapeHtml(f.placeholder || "")}" ${f.disabled ? "disabled" : ""} />`
          }
        </div>
      `).join("");

      root.innerHTML = `
        <div class="glass-modal-overlay active" id="frm-overlay" role="dialog" aria-modal="true">
          <div class="glass-modal" style="width:480px;max-width:95vw">
            <div class="glass-modal-head">
              <div class="glass-modal-title">${escapeHtml(title)}</div>
              <button class="glass-modal-x" type="button" onclick="closeEditModal()">✕</button>
            </div>
            <div class="glass-modal-body">
              ${fieldsHtml}
              <div id="frm-error" class="error"></div>
            </div>
            <div class="glass-modal-actions">
              <button class="ghost-btn" type="button" onclick="closeEditModal()">Cancelar</button>
              <button class="cta" type="button" onclick="__frmSave()">💾 Guardar</button>
            </div>
          </div>
        </div>
      `;

      document.getElementById('frm-overlay').addEventListener('click', e => {
        if (e.target.id === 'frm-overlay') closeEditModal();
      });

      window.__frmSave = onSave;
      setTimeout(() => document.getElementById('frm-overlay')?.focus(), 100);
    }

    window.openEditProfileForm = function() {
      openEditModal({
        title: "Editar perfil",
        fields: [
          { id: "name", label: "Nombre", type: "text", value: currentProfile?.name, required: true },
          { id: "surname", label: "Apellidos", type: "text", value: currentProfile?.surname },
          { id: "email", label: "Email", type: "email", value: currentUser?.email || "", disabled: true },
          { id: "phone", label: "Teléfono", type: "tel", value: currentProfile?.phone },
          { id: "address", label: "Dirección", type: "text", value: currentProfile?.address },
          { id: "city", label: "Ciudad", type: "text", value: currentProfile?.city },
          { id: "province", label: "Provincia", type: "text", value: currentProfile?.province },
          { id: "postal", label: "Código Postal", type: "text", value: currentProfile?.postal }
        ],
        onSave: async () => {
          const name = document.getElementById('frm-name').value;
          if (!name) {
            document.getElementById('frm-error').textContent = 'El nombre es requerido';
            document.getElementById('frm-error').style.display = 'block';
            return;
          }
          try {
            const updates = {
              name: name,
              surname: document.getElementById('frm-surname').value,
              phone: document.getElementById('frm-phone').value,
              address: document.getElementById('frm-address').value,
              city: document.getElementById('frm-city').value,
              province: document.getElementById('frm-province').value,
              postal: document.getElementById('frm-postal').value
            };
            Object.assign(currentProfile, updates);
            closeEditModal();
            renderProfile();
          } catch (e) {
            document.getElementById('frm-error').textContent = 'Error: ' + e.message;
            document.getElementById('frm-error').style.display = 'block';
          }
        }
      });
    };

    window.openAvatarUpload = function() {
      const root = document.getElementById('avatar-modal-root');
      root.innerHTML = `
        <div class="glass-modal-overlay active" id="avatar-overlay" role="dialog" aria-modal="true">
          <div class="glass-modal" style="width:400px;max-width:95vw">
            <div class="glass-modal-head">
              <div class="glass-modal-title">Cambiar foto de perfil</div>
              <button class="glass-modal-x" type="button" onclick="closeAvatarModal()">✕</button>
            </div>
            <div class="glass-modal-body" style="text-align: center;">
              <img id="avatar-preview" src="${currentProfile?.avatar_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect fill=%22%23333%22 width=%22100%22 height=%22100%22/%3E%3Ctext x=%2250%22 y=%2250%22 font-size=%2240%22 fill=%22%23999%22 text-anchor=%22middle%22 dy=%22.3em%22%3E👤%3C/text%3E%3C/svg%3E'}" alt="Avatar preview">
              <input type="file" id="avatar-input" accept="image/*" style="display:none">
              <button type="button" class="cta" style="width: 100%; padding: 0.75rem;" onclick="document.getElementById('avatar-input').click()">
                Seleccionar imagen
              </button>
              <p style="color: rgba(238,244,255,.5); font-size: 12px; margin-top: 1rem; margin-bottom: 0;">
                Formatos: JPG, PNG, WebP (máx 5MB)
              </p>
              <div id="avatar-error" class="error"></div>
            </div>
          </div>
        </div>
      `;

      document.getElementById('avatar-overlay').addEventListener('click', e => {
        if (e.target.id === 'avatar-overlay') closeAvatarModal();
      });

      const fileInput = document.getElementById('avatar-input');
      fileInput.addEventListener('change', async () => {
        const file = fileInput.files[0];
        if (!file) return;
        const errDiv = document.getElementById('avatar-error');
        errDiv.style.display = 'none';
        try {
          currentProfile.avatar_url = URL.createObjectURL(file);
          document.getElementById('avatar-preview').src = currentProfile.avatar_url;
          setTimeout(() => closeAvatarModal(), 800);
        } catch (e) {
          errDiv.textContent = 'Error: ' + e.message;
          errDiv.style.display = 'block';
        }
      });
    };

    window.logoutUser = async function() {
      if (window.logout && typeof window.logout === 'function') {
        await window.logout();
      } else {
        window.location.href = 'login.html';
      }
    };

    window.closeEditModal = function() {
      document.getElementById('edit-modal-root').innerHTML = '';
    };

    window.closeAvatarModal = function() {
      document.getElementById('avatar-modal-root').innerHTML = '';
    };

    window.showHelp = function() {
      alert('Perfil de Usuario\n\nGestiona tu perfil, foto y configuración personal.\n\nEsta función estará disponible próximamente.');
    };

    window.openFullWindow = function() {
      window.open('user.html', '_blank', 'width=1200,height=800');
    };

    initUser();
  </script>

</body>
</html>
